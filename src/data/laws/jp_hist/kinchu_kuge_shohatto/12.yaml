article: 12
title: '第12条 罪の軽重は名例律'
originalText:
  - '罪の軽重は、名例律を守らるべきの事。'
osakaText: []
commentary:
  - 'この条文は、公家社会における犯罪の軽重の判断について、名例律という律令法の基本原則に従うべきであると定めています。名例律は日本古代の律令のうち、刑罰の総則にあたる部分で、罪の重さに応じた量刑の考え方を規定していました。'
  - '江戸時代には武家の間では独自の刑罰慣行が発達していましたが、公家社会の犯罪については、古代以来の律令法の枠組みを参照するという伝統的な処理方針がこの条文によって確認されています。わずか一文ながら、公家という古い身分秩序に属する集団には、古代法の理念を援用するのがふさわしいという考え方が表れています。'
  - '例えば、ある公家が罪を犯した場合、その罪がどの程度重いものかを判断する際には、武家の慣行ではなく名例律に定められた分類や量刑の考え方が基準とされます。前条の流罪規定とあわせて読むと、第十一条で命令違反への刑罰そのものを定め、第十二条でその軽重を判断する基準を示すという、二段構えの規定になっていることが分かります。'
commentaryOsaka: []
