article: 4
title: '第4条 器用なき者は任ぜず'
originalText:
  - '摂家たりといえども、その器用なき者は、三公・摂関に任ぜらるべからず。況んやその外をや。'
osakaText: []
commentary:
  - 'この条文は、摂関家（近衛・九条・二条・一条・鷹司の五摂家）の出身であっても、能力のない者を三公や摂政・関白に任命してはならないと定めています。さらに「況んやその外をや」と、摂関家以外の家についてはなおさらであると念を押しています。'
  - '家格だけで最高位の官職が自動的に約束されるのではなく、実際の器量（能力・人物）が伴わなければならないという原則を示した条文です。江戸時代の朝廷は摂関家による官職の事実上の独占状態にありましたが、幕府はこの条文によって能力主義的な建前を残し、無能な者が最高位に居座ることを防ごうとしました。'
  - '例えば、摂関家に生まれたというだけで、政治の実務も学問もおろそかな人物が関白に就こうとしても、この条文を根拠に幕府や朝廷はその任命を差し止めることができます。第十条が学問や奉公の功績によって家格を超えた昇進を認めているのと考え合わせると、この法度が家格の原則を保ちながらも能力による補正を随所に組み込んでいたことがよく分かります。'
