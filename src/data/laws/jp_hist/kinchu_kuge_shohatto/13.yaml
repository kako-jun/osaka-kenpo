article: 13
title: '第13条 摂家門跡の座位'
originalText:
  - '摂家門跡は、親王門跡の次座たるべし。摂家三公の時は親王の上たりといえども、前官の大臣は次座と相定むる上は、これに准ずべし。ただし皇子連枝の外、門跡は親王宣下あるまじきなり。門跡の室の位は、その仁体により先規を考うべし。法中の親王は希有の儀なり、近代繁多に及ぶは、その謂れなし。摂家門跡・親王門跡の外、門跡は准門跡たるべきの事。'
osakaText: []
commentary:
  - 'この条文は、摂関家出身の門跡（皇族や公家が住持を務める特定の寺院、およびその住持自身を指す称号）の座位について、親王門跡の次に位置づけると定めています。摂関家が三公の地位にある間は親王よりも上座になりますが、前官の大臣となった後は次座と定められる以上、それに準じるとしています。'
  - 'あわせて、皇子や天皇の近親（連枝）以外の者を門跡として親王宣下することは今後認めないとし、法親王（出家した親王）の存在自体が本来は稀なことであるにもかかわらず、近年みだりに増えていることを問題視しています。摂家門跡・親王門跡以外の門跡は「准門跡」という一段下の扱いにとどめるとも定めており、門跡という称号の乱発に歯止めをかけようとする意図が明確に読み取れます。'
  - '例えば、本来であれば皇族出身者に限られるべき法親王の地位を、血縁の薄い者にまで安易に与えるようなことがあれば、この条文によって認められません。第二条・第三条で示された親王と大臣の座次の原則を、寺院社会における門跡の序列にもそのまま応用しており、朝廷の身分秩序が仏教界の序列とも密接に連動していたことがうかがえます。'
