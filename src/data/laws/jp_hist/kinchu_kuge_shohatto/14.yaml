article: 14
title: '第14条 僧正・門跡の先例'
originalText:
  - '僧正（大僧正・正僧正・権僧正）、門跡・院家は先例を守るべし。平民に至りては、器用卓抜の仁、希有にこれを任ずといえども、准僧正たるべきなり。ただし国王・大臣の師範は各別の事。'
osakaText: []
commentary:
  - 'この条文は、大僧正・正僧正・権僧正といった僧正の位や、門跡・院家（有力な寺院やその住持の家格）の任命について、これまでの先例を守るべきであると定めています。ただし、出身が平民であっても、抜きん出て優れた能力を持つ者であれば、稀な例として准僧正に任じてよいとしています。'
  - '仏教界の高位も原則として家格や出自に基づいて任命されていましたが、この条文はそこにわずかな例外の余地を残し、真に優れた人物であれば身分の壁を越えて登用できる道を用意しています。ただし国王（天皇）や大臣の師範を務めるような高僧については、この限りではなく別扱いとされています。'
  - '例えば、有力な寺院の出身ではない平民の僧であっても、学識や修行において際立った実績を上げれば、准僧正という形で高い位に取り立てられる余地があります。第四条・第十条で見た「家格よりも実質的な能力を重んじる」という発想が、公家社会だけでなく仏教界の位階にも及んでいる点は興味深く、天皇・公家の法度に僧侶の規定が含まれているのは、近世において皇室・公家と仏教寺院、とりわけ皇族や公家出身者が住持を務める門跡寺院とが、人材面でも制度面でも密接に結びついていたためです。'
