article: 1
title: '第1条 天子御学問の要諦'
originalText:
  - '天子御芸能の事、第一は御学問なり。学ばざれば則ち古道に明らかならず、しかして能く政を致し太平を致す者、未だこれあらざるなり。貞観政要に明文なり。寛平遺誡に、経史を窮めずといえども、群書治要を誦習すべしと云々。和歌は光孝天皇より未だ絶えず、綺語たりといえども、我が国の習俗なり、棄て置くべからずと云々。禁秘抄に載する所、御習学専要に候の事。'
osakaText: []
commentary:
  - 'この条文は禁中並公家諸法度全体の巻頭に置かれた総則で、天子（天皇）が身につけるべき諸芸能のうち、第一に重んじるべきは学問であると宣言しています。学ばなければ古来の政道に暗くなり、太平の世をもたらす政治などできたためしがないと述べ、唐の太宗の言行録『貞観政要』を典拠として引いています。'
  - 'あわせて宇多天皇の『寛平遺誡』を引き、経書や史書を究めずとも中国の政治要諦をまとめた『群書治要』だけは読み習うべきだとし、和歌についても光孝天皇以来絶えることのない日本の習俗として軽んじてはならないと定めています。学問と和歌という一見異なる二つを並べているのは、儒学的な政治教養と和歌に象徴される王朝文化の両方を天皇の必須の教養と位置づけたためです。'
  - '例えば、江戸幕府はこの第一条を掲げることで、天皇に対し政治的な実権ではなく学問・文化面での権威を期待する姿勢を示したと考えられます。武家諸法度の第一条が大名に「文武弓馬の道」を求めたのと対をなす形で、こちらは天子に「御学問」を求めており、幕府が公家と武家それぞれに異なる役割を割り当てていたことがうかがえます。'
