article: 7
title: '第7条 武家官位は公家官位の外'
originalText:
  - '武家の官位は、公家当官の外たるべきの事。'
osakaText: []
commentary:
  - 'この条文は、武家が任じられる官位を、公家が本来就く官職とは別枠のものとすると定めています。わずか一文ですが、公家社会の官位秩序と武家の官位秩序を切り離すという、この法度全体にとって重要な原則を示しています。'
  - '江戸時代には多くの大名や旗本が「守」「介」などの官名を名乗っていましたが、これらは朝廷の実際の官職定員とは別枠で幕府が推薦し朝廷が形式的に叙任する、いわば名誉称号としての性格を強めていました。この条文はその実態を法度として追認し、公家の官位昇進の枠を武家に圧迫されないようにする意味も持っていました。'
  - '例えば、ある大名が「筑前守」を名乗ったとしても、それは公家が代々務めてきた実務官職の定員を奪うものではなく、あくまで武家用の別枠として扱われます。第十条が公家の昇進の次第を定めているのと対になっており、公家の官位秩序を守りながら、武家にも官位による格付けの仕組みを与えるという、幕府の巧みな制度設計がうかがえます。'
