article: 7
title: '第7条 武家官位は公家官位の外'
originalText:
  - '武家の官位は、公家当官の外たるべきの事。'
osakaText:
  - '武家はんが任じられる官位はな、公家はんが本来就く官職とは別枠のもんとするんやで。'
commentary:
  - 'この条文は、武家が任じられる官位を、公家が本来就く官職とは別枠のものとすると定めています。わずか一文ですが、公家社会の官位秩序と武家の官位秩序を切り離すという、この法度全体にとって重要な原則を示しています。'
  - '江戸時代には多くの大名や旗本が「守」「介」などの官名を名乗っていましたが、これらは朝廷の実際の官職定員とは別枠で幕府が推薦し朝廷が形式的に叙任する、いわば名誉称号としての性格を強めていました。この条文はその実態を法度として追認し、公家の官位昇進の枠を武家に圧迫されないようにする意味も持っていました。'
  - '例えば、ある大名が「筑前守」を名乗ったとしても、それは公家が代々務めてきた実務官職の定員を奪うものではなく、あくまで武家用の別枠として扱われます。第十条が公家の昇進の次第を定めているのと対になっており、公家の官位秩序を守りながら、武家にも官位による格付けの仕組みを与えるという、幕府の巧みな制度設計がうかがえます。'
commentaryOsaka:
  - 'お侍さんが「筑前守」やら「伊豆守」やらいう肩書きを名乗ってるん、聞いたことあるやろ。ほな、ほんまに筑前の国の政治をその人がやってるんかいうたら、そんなことはあらへんのや。この第七条は、そのからくりをはっきりさせてる条文やねん。'
  - '例えばな、Mさんいう大名はんが「美作守」を名乗ってたとするやろ。ほんなら公家のNさんが「わたしが継ぐはずの官職の枠が武士に取られてしもうた」と心配になるかもしれんけど、その心配は無用なんや。武家の官位は公家の官職の定員とは別枠、いうことがこの条文でちゃんと保証されとるから、Nさんの家の官職が奪われることはあらへん。'
  - '肩書きと実務をきっちり切り分けるいうんは、今で言うたら名誉職と実務職を分けるようなもんかもしれんな。名前だけはえらそうでも、実際にその土地を治めてるわけやない。そう考えると、武士に箔をつけさせつつ、公家の生活の場もちゃんと守るいう、両方に目配りした条文やったんやろうと思うで。'
