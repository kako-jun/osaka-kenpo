article: 6
title: '第6条 養子は同姓たるべし'
originalText:
  - '養子は連綿たるべし。ただし同姓を用いらるべし。女縁、その家督を相続すること、古今一切これなきの事。'
osakaText: []
commentary:
  - 'この条文は、公家の家の跡継ぎとなる養子について、同姓（同じ家系の血筋）の者を用いるべきであり、女系の縁者が家督を相続することは昔から一切認められていないと定めています。'
  - '公家社会では家の存続のために養子を迎えることが広く行われていましたが、その養子が全く別の家系や、女性を通じた縁者であった場合、家の由緒や血統の一貫性が失われてしまいます。この条文は、そうした家督相続の混乱を防ぎ、公家の家格制度そのものを安定させるための規定です。'
  - '例えば、跡継ぎのいない公家の家が、遠縁にあたる別姓の家から養子を迎えて家督を継がせようとしても、この条文に反するため認められません。同姓の一族の中から養子を選ぶ必要があり、これは武家諸法度が大名の婚姻や養子縁組を幕府の許可制としたのと同様に、家の存続を法度によって管理しようとする江戸幕府の姿勢を反映しています。'
commentaryOsaka: []
