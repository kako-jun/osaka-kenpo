article: 3
title: '第3条 清花大臣の座位'
originalText:
  - '清花の大臣、辞表の後の座位は、諸親王の次座たるべきの事。'
osakaText: []
commentary:
  - 'この条文は、清華家（せいがけ、摂関家に次ぐ格式を持つ公家の家格）出身の大臣が辞任した後の座位について定めたもので、辞表を提出した後は諸親王の次の座に位置づけられると規定しています。'
  - '前条（第二条）で示された、現任の三公は親王より上位、辞任後は親王より下位という原則を、清華家出身の大臣についても同様に適用することを確認する条文です。摂関家だけでなく清華家についても座次の基準を明文化しておくことで、朝廷内での序列争いをあらかじめ防ごうとする意図がうかがえます。'
  - '例えば、清華家出身の大臣が辞任した後も現役時代と同じ格式を主張して上座を求めるようなことがあれば、この条文によって諸親王の次座であることが明確な根拠となります。第二条・第十三条とあわせて、幕府が公家社会の複雑な家格秩序を成文化し、争いの種をあらかじめ取り除こうとしていたことが読み取れます。'
commentaryOsaka: []
