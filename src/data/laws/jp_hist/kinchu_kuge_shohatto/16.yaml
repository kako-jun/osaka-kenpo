article: 16
title: '第16条 紫衣勅許の乱れ'
originalText:
  - '紫衣の寺の住持職は、先規希有の事なり。近年猥りに勅許の事、かつは臈次を乱し、かつは官寺を汚す、甚だ然るべからず。向後においては、その器用を撰び、戒臈相積み、智あり聞こえある者、入院の儀、申し沙汰あるべきの事。'
osakaText:
  - '紫衣を許された寺の住職になる、ゆうんはな、もともとはめったにない、えらい珍しい話やったんやで。'
  - 'せやのに、近ごろはむやみやたらと勅許が出されてしもて、僧侶としての経験年数の順番を乱してしまうし、官寺の格式まで汚してしまうんや。これはほんまにあかんことやで。'
  - 'せやから、これから先はな、その人の器量をちゃんと選んで、戒律を守った年数もしっかり積んで、学識があって評判のええ人についてだけ、入院、つまり住職になることを申し出るべきなんやで。'
commentary:
  - 'この条文は、紫衣（天皇の勅許によって高僧に与えられる紫色の袈裟・法衣）を許された寺院の住持職について、本来は先例が乏しいほど稀な栄誉であったのに、近年はみだりに勅許が乱発されていることを問題視しています。これによって僧侶としての経験年数（臈次）の序列が乱れ、官寺の格式そのものが汚されているとして、今後は住持としての器量をよく選び、戒律を守った年数を十分に積み、学識と評判を兼ね備えた者についてのみ、入院（住持となること）を申し沙汰すべきであると定めています。'
  - '紫衣勅許は形式上は天皇の権限でしたが、実際には朝廷が独自の判断で乱発する例が増えており、幕府にとっては朝廷が幕府の統制を離れて独自の権威を行使しているように映る問題でした。この条文は、紫衣という宗教的な栄誉の授与にまで幕府が基準を持ち込み、天皇の勅許権に事実上の制約を課そうとするものです。'
  - '例えば、修行の年数も浅く、学識も乏しい僧侶が、有力な後ろ盾を得て安易に紫衣を得るようなことがあれば、この条文の趣旨に反することになります。この規定は発布から十年余りのちの寛永四年（1627年）、幕府の許可なく後水尾天皇が行った紫衣勅許を幕府が無効と主張する「紫衣事件」を引き起こす火種となり、寛永六年（1629年）には大徳寺の沢庵宗彭らが処罰される事態にまで発展しました。天皇・公家の法度に僧侶の位階規定が含まれているのは、皇室が仏教寺院の人事・栄典に深く関わっていた近世社会の実情を反映したものです。'
commentaryOsaka:
  - 'この十六条はな、法度が発布されてすぐに、実際にえらい大きな事件を引き起こしてしもた、いわくつきの条文やねん。紫衣ゆうんは天皇から特別に許された、格の高い袈裟のことでな、それを着られる寺の住職になる、ゆうのは本来はめったにない、ものすごい名誉やったんや。'
  - '例えばな、太郎さんゆうお坊さんがおったとして、太郎さんがほんまに長年戒律を守り抜いて、学識も評判も申し分ない、ゆう場合やったら、紫衣を許されて住職になるんは、それこそ一生に一度あるかないかの晴れがましいことやったはずやねん。せやのに、この条文ができる少し前の時期には、そういう積み重ねをすっ飛ばして、次々に紫衣が許されてしまうことが増えてしもうてな、経験の浅い人が先輩を追い越して住職になったりして、官寺の格式そのものが軽うなってしもうたんや。'
  - 'この条文が出てから十年あまりたった寛永四年に、幕府の許可を得んと後水尾天皇が紫衣を勅許してしもて、幕府が「これは無効や」ゆうて突っぱねる、いわゆる紫衣事件が起こってしもたんや。大徳寺の沢庵さんら、名だたるお坊さんまで処罰される事態になってしもてな。天皇の権威と幕府の統制、どっちを上に置くかっちゅう根っこの対立が、こんな一本の条文からむき出しになった、ゆう意味で、この十六条は法度の中でもとりわけ重たい条文やと思うわ。'
