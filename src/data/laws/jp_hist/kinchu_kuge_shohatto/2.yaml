article: 2
title: '第2条 親王と三公の座次'
originalText:
  - '三公の下は親王なり。その故は、右大臣不比等、舎人親王の上に着く。殊に舎人親王・仲野親王、贈太政大臣穂積親王を右大臣に准ず。これ皆一品親王以後、大臣を贈らるる時は三公の下たるべきこと、勿論か。親王の次は前官の大臣なり。三公、在官の内は親王の上たり、辞表の後は次座たるべし。その次は諸親王なり。ただし儲君は各別。前官の大臣、関白職再任の時は、摂家の内、位次たるべきの事。'
osakaText: []
commentary:
  - 'この条文は、太政大臣・左大臣・右大臣からなる三公と、天皇の皇子である親王との朝廷における座次（席次）を定めたものです。現任の三公は親王より上位に立ちますが、辞任後の三公は親王の次座に下がるという原則を示し、藤原不比等が舎人親王の上座に着いた故実や、贈太政大臣となった穂積親王の例などを引いて、その根拠を丁寧に説明しています。'
  - '続けて、摂関職に再任された前官の大臣については摂家の内での位次によるとするなど、細かい例外規定も盛り込まれています。当時の朝廷では官職の序列だけでなく、誰がどの故実に基づいてどの席に座るかということ自体が重要な政治的意味を持っており、こうした座次の争いが実際にたびたび問題となっていました。'
  - '例えば、ある親王が現役の大臣より上座に座ろうとして、家の格式や過去の先例を持ち出して主張するようなことがあれば、この条文に基づいて幕府の定めた座次のルールで決着をつけることができます。第三条・第十三条などその後に続く座位に関する条文とあわせて読むと、幕府が朝廷の内部秩序にまで細かく介入し、席次という象徴的な領域を通じて統制を図っていたことがよく分かります。'
