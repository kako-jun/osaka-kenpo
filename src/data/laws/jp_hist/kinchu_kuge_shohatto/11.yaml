article: 11
title: '第11条 命令違背は流罪'
originalText:
  - '関白・伝奏、ならびに奉行・職事等申し渡す儀、堂上・地下の輩、相背くにおいては、流罪たるべきの事。'
osakaText: []
commentary:
  - 'この条文は、関白や武家伝奏、奉行・職事といった役職者が朝廷内に申し渡す命令に対し、堂上家・地下家を問わずこれに背く者があれば流罪に処すると定めています。'
  - '堂上家は昇殿を許された上級公家、地下家は昇殿を許されない下級の官人を指し、身分の上下を問わずすべての公家がこの命令系統に従うべきことを明示しています。流罪という重い刑罰を明記している点からも、幕府がこの法度全体の実効性を担保するために、命令違反に対して厳しい姿勢で臨んでいたことがうかがえます。'
  - '例えば、ある公家が武家伝奏を通じて伝えられた幕府の意向に公然と逆らい、独自の行動をとったとすれば、この条文により流罪という重い処分の対象となり得ます。次の第十二条が処罰の程度について名例律に従うべきとしているのと対になっており、命令違反への制裁を先に定め、続けてその量刑の基準を示すという構成になっています。'
commentaryOsaka: []
