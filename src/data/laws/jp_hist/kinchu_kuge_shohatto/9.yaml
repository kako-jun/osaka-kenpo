article: 9
title: '第9条 天子諸臣の礼服'
originalText:
  - '天子の礼服は、大袖・小袖・裳、御紋十二象なり。諸臣の礼服は各別なり。御袍は麴塵・青色・帛・生気の御袍、あるいは御引直衣・御小直衣等の事。仙洞の御袍は赤色の橡、あるいは甘御衣。大臣の袍は橡の異文、小直衣。親王の袍は橡、小直衣。公卿は禁色の雑袍を着す。殿上人といえども、大臣の息あるいは孫は、禁色の雑袍を着することを聴す。貫首・五位蔵人・六位蔵人は禁色を着す。極臈に至りては麴塵の袍を着す、これ御服を申し下す儀なり。晴の時は、下臈といえどもこれを着す。袍の色は、四位已上は橡、五位は緋、地下は赤衣、六位は深緑、七位は浅緑、八位は深縹、初位は浅縹。袍の紋は轡唐草輪無、家々旧例をもってこれを着用す、槐に任ずる以後は異文なり。直衣は、公卿は禁色の直衣、始めあるいは拝領、家々先規に任せてこれを着用す。殿上人の直衣は、羽林家の外はこれを着せず。殿上人といえども、大臣の息また孫は、禁色の直衣を着することを聴す。布衣・直垂は、所に随いてこれを着用するなり。小袖は、公卿は衣冠の時は綾を着し、殿上人は綾を着せず。煉貫は、羽林家は三十六歳までこれを着し、この外は着せず。紅梅は、十六歳三月まで諸家これを着し、この外は平絹なり。冠は、十六歳未満は透額。帷子は、公卿は端午より、殿上人は四月酉の加茂祭より、着用普通の事。'
osakaText: []
commentary:
  - 'この条文は、天皇をはじめ公卿・殿上人など身分ごとに着用できる礼服の種類・色・文様・生地を細かく定めたもので、十七条の中でも最も長大な規定です。天子の礼服には十二種類の紋（十二章）が施され、諸臣の礼服はそれとは明確に区別されるとした上で、袍（束帯の上着）の色を四位以上は橡色、五位は緋色、六位は深緑というように位階ごとに指定し、直衣・小袖・冠・帷子に至るまで、年齢や家格による着用の可否を細かく規定しています。'
  - 'これほど服飾規定が細かいのは単なる趣味の問題ではなく、装束の色や文様そのものが位階と身分を一目で示す記号として機能していたためです。誰が禁色（限られた者しか着用を許されない色）を着られるか、誰が綾織りの小袖を着られるかということが、そのまま朝廷内の序列を可視化する仕組みになっていました。'
  - '例えば、五位の蔵人が本来六位以下しか着用を許されない色の袍を着て参内したとすれば、それは単なる服装の乱れではなく、身分秩序そのものを乱す重大な問題として扱われます。第二条・第三条・第十三条など座次を定めた条文と同じ発想で、この条文は装束という目に見える形で身分の違いを固定化し、朝廷全体の秩序を保とうとしたものといえます。'
