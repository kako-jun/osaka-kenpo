article: 10
title: '第10条 昇進の次第'
originalText:
  - '諸家昇進の次第は、その家々旧例を守りて申し上ぐべし。ただし、学問有識、歌道を勤学せしめ、その外奉公の労を積むにおいては、超越たりといえども、御推任・御推叙成さるべし。下道真備、従八位下たりといえども、才智の誉れあるにより、右大臣に拝任す、尤も規摸なり。蛍雪の功、棄捐すべからざるの事。'
osakaText: []
commentary:
  - 'この条文は、公家の各家における昇進の順序について、それぞれの家が代々の旧例を守って朝廷に申し上げるべきであるとした上で、学問に通じ、歌道を勤め励んだ者や、朝廷への奉公の功労を積んだ者については、家格の序列を飛び越えてでも特別に推薦・昇進させてよいと定めています。'
  - 'その根拠として、奈良時代に従八位下という低い身分から抜擢され、優れた才知の誉れによって最終的に右大臣にまで昇った吉備真備（下道真備）の故実が引かれています。家柄が全てではなく、学問と功労によって身分を超えた昇進があり得るということを、実在の成功例をもって裏付けているのです。'
  - '例えば、家格の低い公家の子弟であっても、歌道や漢学に励んで高い評価を得れば、家の慣例では望めないはずの昇進の道が開かれます。第四条・第五条が能力を重視する姿勢を示していたのと同じ考え方がここでも貫かれており、末尾の「蛍雪の功は棄てるべきではない」という一文は、地道な勉学の積み重ねを幕府自身が公家社会に奨励していたことを物語っています。'
