name: '禁中並公家諸法度'
shortName: '禁中並公家諸法度'
badge: '天皇はんも公家はんも、好き勝手させへんで！'
year: 1615
source: '慶長二十年（1615年）七月発布'
description: '江戸幕府が天皇と公家を統制するため慶長二十年（1615年）に発布した法度。学問の奨励から官位・座次・改元・服飾・僧侶の位階まで定めた全17条。武家諸法度と異なり、その後「禁中並」の呼称が加わったのは名称変更にとどまり、制定以来内容の改訂は行われていない。'
