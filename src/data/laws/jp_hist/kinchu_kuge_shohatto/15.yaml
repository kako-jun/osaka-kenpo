article: 15
title: '第15条 門跡・院家の任叙'
originalText:
  - '門跡は、僧都（大僧都・正僧都・少僧都）・法印に任叙するの事。院家は、僧都（大僧都・正僧都・権僧都）・律師・法印・法眼、先例に任せて任叙すること勿論なり。ただし平人は、本寺推挙の上、なお以て器用を相選び、申し沙汰すべきの事。'
osakaText: []
commentary:
  - 'この条文は、門跡の位にある者は大僧都・正僧都・少僧都や法印に任叙されること、院家については大僧都・正僧都・権僧都や律師・法印・法眼に、それぞれ先例に従って任叙されることを当然のこととして認めています。ただし、出身が平民である場合には、まず本寺の推薦を得た上で、なお改めて能力を選定してから朝廷に申し上げるべきであるとしています。'
  - '前条（第十四条）が僧正・門跡・院家という上位の位階について定めていたのに対し、この条文はその下に連なる僧都・律師・法印・法眼といった位階の任叙手続きをより具体的に定めたものです。家格に基づく門跡・院家出身者は先例通りの任叙で問題ないとしつつ、平民出身者については本寺の推薦と能力審査という二段階の手続きを課している点が特徴です。'
  - '例えば、有力な門跡寺院の出身者であれば慣例に従ってそのまま僧都や法印に任じられますが、平民出身の僧がこれらの位を得ようとする場合は、まず所属する本寺からの推薦を受け、さらにその人物の能力が本当に位にふさわしいかを重ねて選考する必要があります。第十四条と同様、家格を原則としながらも能力による例外の道を残すという、この法度全体に共通する姿勢がここにも表れています。'
