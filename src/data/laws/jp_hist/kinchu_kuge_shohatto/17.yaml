article: 17
title: '第17条 上人号の勅許'
originalText:
  - '上人号の事、碩学の輩は、本寺、正・権の差別を撰び申し上ぐるにおいては、勅許成さるべし。ただしその仁体、仏法修行二十箇年に及ぶ者は正たるべし。年序未満の者は権たるべし。猥りに競望の儀これあるにおいては、流罪に行わるべきの事。'
osakaText: []
commentary:
  - 'この条文は、「上人」という称号について、学識に優れた僧が本寺から「正」「権」の区別をつけて朝廷に申し上げた場合に勅許されるものであると定めています。そのうえで、仏法修行が二十年以上に及ぶ者は「正」の上人号を、修行年数がそれに満たない者は「権」の上人号を与えるべきであるとし、この区別をみだりに競って求めるような者があれば流罪に処するとしています。'
  - '上人号は僧侶にとって名誉ある称号でしたが、それだけに希望者が多く、称号を巡る競望や不正が起こりやすいものでした。この条文は、修行年数という客観的な基準を明示することで、称号授与の公平性を保とうとするとともに、みだりに求める者には流罪という重い罰則を科すことで抑止を図っています。'
  - '例えば、実際の修行年数が十年ほどしかない僧が、有力者に働きかけて「正」の上人号を得ようとするような行為は、この条文によって厳しく戒められています。前条の紫衣に関する規定と同様、僧侶の称号・位階にまで細かく基準を設けているのは、近世において朝廷・公家と仏教界が人材・栄典の両面で深く結びついており、その秩序の乱れが公家社会全体の秩序の乱れにも直結すると幕府が考えていたためです。第一条から続くこの法度全体を通して見ると、学問・座次・服飾・官位・宗教的栄典という、天皇と公家社会を構成するあらゆる要素に幕府が細かく規定を及ぼしていたことが分かります。'
