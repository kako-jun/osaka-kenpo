article: 17
title: '第17条 上人号の勅許'
originalText:
  - '上人号の事、碩学の輩は、本寺、正・権の差別を撰び申し上ぐるにおいては、勅許成さるべし。ただしその仁体、仏法修行二十箇年に及ぶ者は正たるべし。年序未満の者は権たるべし。猥りに競望の儀これあるにおいては、流罪に行わるべきの事。'
osakaText:
  - '上人ゆう称号についてはな、学識に優れたお坊さんを、本寺が「正」か「権」かをちゃんと区別したうえで朝廷に申し上げたら、勅許してもらえるんやで。'
  - 'ただし、その人が仏法の修行を二十年以上積んどったら「正」の上人号になるんや。'
  - '修行の年数がそれに足らへん人は「権」の上人号ゆうことになるんやな。'
  - 'むやみやたらと競い合って上人号を求めるようなことがあったら、流罪という重い罰を受けることになるんや。'
commentary:
  - 'この条文は、「上人」という称号について、学識に優れた僧が本寺から「正」「権」の区別をつけて朝廷に申し上げた場合に勅許されるものであると定めています。そのうえで、仏法修行が二十年以上に及ぶ者は「正」の上人号を、修行年数がそれに満たない者は「権」の上人号を与えるべきであるとし、この区別をみだりに競って求めるような者があれば流罪に処するとしています。'
  - '上人号は僧侶にとって名誉ある称号でしたが、それだけに希望者が多く、称号を巡る競望や不正が起こりやすいものでした。この条文は、修行年数という客観的な基準を明示することで、称号授与の公平性を保とうとするとともに、みだりに求める者には流罪という重い罰則を科すことで抑止を図っています。'
  - '例えば、実際の修行年数が十年ほどしかない僧が、有力者に働きかけて「正」の上人号を得ようとするような行為は、この条文によって厳しく戒められています。前条の紫衣に関する規定と同様、僧侶の称号・位階にまで細かく基準を設けているのは、近世において朝廷・公家と仏教界が人材・栄典の両面で深く結びついており、その秩序の乱れが公家社会全体の秩序の乱れにも直結すると幕府が考えていたためです。第一条から続くこの法度全体を通して見ると、学問・座次・服飾・官位・宗教的栄典という、天皇と公家社会を構成するあらゆる要素に幕府が細かく規定を及ぼしていたことが分かります。'
commentaryOsaka:
  - 'この十七条はな、「上人」ゆう称号にランクをつけて、しかもニセモノが出んように、けっこう細かい仕組みを作ったある条文やねん。学識のある立派なお坊さんやったら誰でも上人号がもらえるっちゅうわけやなくて、本寺がちゃんと審査して、しかも「正」か「権」かまで区別して朝廷に申し上げなあかん、ゆう二段構えになっとるんや。'
  - '例えばな、次郎さんゆうお坊さんが仏法の修行を二十年以上積んどったとしたら、本寺が「正」の上人号として朝廷に申し上げることができるんや。せやけど、次郎さんの修行がまだ十年やそこらしか経っとらんかったら、たとえどんなに評判がよくても、行けるのは「権」の上人号までなんやで。もし次郎さんが有力な人に頼み込んで、修行年数をごまかしてでも「正」の上人号を無理やり手に入れようとしたら、この条文によって流罪ゆう重い罰が待っとるんや。'
  - '修行年数っちゅう、ごまかしようのない数字を基準にしとるところが、この条文の賢いとこやと思うわ。人柄がええとか評判がええとかゆう、あいまいな基準だけやと、結局は権力者に取り入った者勝ちになってしまいかねへんけど、二十年ゆう年数を線引きに使うことで、変な競争や不正な働きかけを防ごうとしたんやろな。称号の値打ちを守るための、なかなか合理的な仕組みやと思うわ。'
