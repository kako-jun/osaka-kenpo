article: 5
title: '第5条 老年による辞退の禁'
originalText:
  - '器用の御仁体は、老年に及ばるといえども、三公・摂関、辞表あるべからず。ただし辞表ありといえども、再任あるべきの事。'
osakaText: []
commentary:
  - 'この条文は、三公・摂政・関白の職にある人物が能力を備えている限り、高齢になったからといって自ら辞任すべきではないと定めています。ただし、実際に辞表を提出した場合でも、その後に再任されることは差し支えないとしています。'
  - '前条（第四条）が無能な者の任命を禁じたのに対し、この条文は逆に有能な者を年齢だけを理由に退けてはならないという原則を示しています。両条をあわせて読むと、この法度が家格ではなく実質的な能力を重視する姿勢を一貫して持っていたことが分かります。'
  - '例えば、高齢になった関白が「もう歳だから」と一度辞表を出したとしても、朝廷や幕府がその人物の手腕をなお必要と判断すれば、改めて同じ職に任じることができます。第十条の「蛍雪の功は棄てるべきではない」という考え方とも通じており、年齢や在任期間ではなく実力を評価軸に据える発想が全体を貫いています。'
