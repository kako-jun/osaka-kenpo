article: 8
title: '第8条 改元の作法'
originalText:
  - '改元は、漢朝の年号の内、吉例をもって相定むべし。ただし重ねて習礼相熟するにおいては、本朝光規の作法たるべきの事。'
osakaText: []
commentary:
  - 'この条文は、元号（年号）を改める際には、中国の歴代王朝で使われた年号の中から縁起の良い先例を選んで定めるべきであると規定しています。ただし、今後日本独自の改元の礼式・作法が習熟して定着すれば、日本古来の先例によることも認めるとしています。'
  - '改元は天皇の重要な権能の一つでしたが、実務上は年号に用いる漢字の典拠を中国の古典に求めることが長く続いており、この条文はその慣行を追認したものです。同時に「重ねて習礼相熟すれば本朝の先例によってもよい」という留保を付けている点は、いずれ日本独自の作法が確立することも見据えた、やや柔軟な書きぶりになっています。'
  - '例えば、新しい元号を定める際に、公家たちが中国の古典から複数の候補を選び、その中から縁起の良いものを勅定するという手続きが、この条文によって明文化された形になります。天子の学問を重んじた第一条とも通じており、改元という朝廷の重要な儀式においても、漢籍の教養が欠かせないものとされていたことが分かります。'
