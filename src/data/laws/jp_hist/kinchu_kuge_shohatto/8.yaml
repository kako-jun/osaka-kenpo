article: 8
title: '第8条 改元の作法'
originalText:
  - '改元は、漢朝の年号の内、吉例をもって相定むべし。ただし重ねて習礼相熟するにおいては、本朝光規の作法たるべきの事。'
osakaText:
  - '元号を改める時はな、中国の歴代王朝の年号の中から、縁起のええ先例を選んで定めなあかんのやで。'
  - 'ただし、これから改元の作法や礼式が積み重なって身についてきたら、日本古来のやり方によることも認めるんやでな。'
commentary:
  - 'この条文は、元号（年号）を改める際には、中国の歴代王朝で使われた年号の中から縁起の良い先例を選んで定めるべきであると規定しています。ただし、今後日本独自の改元の礼式・作法が習熟して定着すれば、日本古来の先例によることも認めるとしています。'
  - '改元は天皇の重要な権能の一つでしたが、実務上は年号に用いる漢字の典拠を中国の古典に求めることが長く続いており、この条文はその慣行を追認したものです。同時に「重ねて習礼相熟すれば本朝の先例によってもよい」という留保を付けている点は、いずれ日本独自の作法が確立することも見据えた、やや柔軟な書きぶりになっています。'
  - '例えば、新しい元号を定める際に、公家たちが中国の古典から複数の候補を選び、その中から縁起の良いものを勅定するという手続きが、この条文によって明文化された形になります。天子の学問を重んじた第一条とも通じており、改元という朝廷の重要な儀式においても、漢籍の教養が欠かせないものとされていたことが分かります。'
commentaryOsaka:
  - '元号を新しく決める時って、今のわたしらの感覚やと日本の古典から選ぶんが当たり前に思えるやろ。せやけどこの第八条は、まず中国の歴代王朝の年号の中から縁起のええ言葉を選びなさい、と言うてるんよ。ちょっと意外に思う人もおるかもしれんな。'
  - '例えばな、新しい元号を考える場面でOさんとPさんいう二人の公家はんが選定に関わったとするやろ。二人はまず中国の古典をいろいろめくって、縁起のええ候補をいくつか挙げていく。当時は中国の古典こそが学問の権威やったから、そこから選ぶんが一番格式の高いやり方やと考えられてたんや。'
  - 'せやけどこの条文、ただ中国の先例に従いなさいで終わってへんとこがおもしろいねん。今後、日本独自の改元の作法がちゃんと積み重なって定着したら、日本古来の先例によってもええでと、将来への含みをちゃんと残しとる。伝統を守りつつも、変わっていく余地を認めてる、なかなか懐の深い条文やと思うで。'
