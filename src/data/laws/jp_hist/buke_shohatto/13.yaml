article: 13
title: '第13条 国主の人選'
originalText:
  - '国主は政務の器用を撰ぶべき事。'
  - '凡そ国を治むるの道は人を得るに在り。功過を明察し、賞罰必ず当たれば、国に善人有りてその国いよいよ殷んなり。国に善人無ければその国必ず亡ぶ。これ先哲の明誡なり。'
osakaText: []
commentary:
  - '第十三条は、国主すなわち大名は政務を的確にこなせる有能な人材を選んで登用すべきだと定めた条文です。細注では、国を治める道は結局のところ人材を得ることにあるとし、功績と過失を明察して賞罰を正しく行い、国に善人がいればその国は栄え、善人がいなければその国は必ず滅びると、先人の教えを引いて説いています。'
  - '十三ヶ条の最後にこの条文が置かれているのは示唆的です。それまでの条文が武芸の鍛錬や風紀の統制、城郭・婚姻・参勤・衣裳・乗輿といった大名家の外形的なあり方を規定してきたのに対し、最終条は統治の中身、すなわち大名自身がどのような人材を側近や家老に据えるかという、統治能力そのものを問う内容になっています。'
  - '例えば、有能な家臣を遠ざけて追従ばかりする者を重用するような大名がいれば、その領国の政務は次第に乱れ、やがて家中の統制も取れなくなっていきます。逆に功績と過失を公平に見極めて適材適所の人事を行う大名は、領国を安定して治めることができます。武家諸法度全体が大名の外面的なふるまいを細かく規定する一方で、最後にこの条文を置くことで、統治の根本は結局のところ人選にあるという普遍的な教訓を示して締めくくっているのです。'
