article: 8
title: '第8条 婚姻の許可制'
originalText:
  - '私に婚姻を締ぶべからざる事。'
  - '夫れ婚合は陰陽和同の道なり。容易にすべからず。睽に曰く「寇に匪ず婚媾せん」と、将に寇を通ぜんとすれば則ち時を失う。桃夭に曰く「男女正を以て婚姻し、時を以てすれば」国に鰥民無きなり。縁を以て党を成す者は、これ姦謀の本なり。'
osakaText: []
commentary:
  - '第八条は、大名が私的に婚姻を取り決めてはならないと定めた条文です。細注では、婚姻は陰陽が和合する重要な道であるからこそ安易に行うべきではないとし、『易経』や『詩経』の言葉を引きながら、時機をわきまえない婚姻や、縁組を通じて党派を作ることは姦謀のもとであると戒めています。'
  - '大名同士の婚姻は単なる私事ではなく、家と家との同盟関係を築く政治的な行為でした。幕府に無断で有力大名同士が縁組を重ねれば、幕府の関与しないところで強固な閨閥・同盟関係が形成され、反幕府勢力の芽となりかねません。'
  - '例えば、有力な外様大名同士が互いの子女を娶わせて姻戚関係を結べば、両家は軍事的にも協力しやすくなり、幕府にとって脅威となる勢力を形成してしまいます。そのため大名の婚姻は幕府の許可制とされ、以後は幕府が縁組を承認する仕組みが定着していきました。第五条・第七条が禁じる他国者との交流や隣国との徒党形成と同様に、この条文も大名同士の私的な結びつきを幕府の統制下に置こうとするものです。'
