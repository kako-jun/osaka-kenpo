article: 10
title: '第10条 衣裳の制限'
originalText:
  - '衣裳の品、混雑すべからざる事。'
  - '君臣上下、各別たるべし。白綾・白小袖・紫裏練・無紋の小袖・紫袷は、御免無き衆、猥りに着用有るべからず。近代、郎従諸卒、綾羅錦繍等の飾服、古法に非ず。甚だこれを制す。'
osakaText: []
commentary:
  - '第十条は、身分に応じた衣裳の区別を守り、上下の別を乱してはならないと定めた条文です。細注では、白綾や白小袖、紫裏の練絹、無紋の小袖、紫の袷といった格式の高い装束は、幕府の許可を得ていない者がみだりに着用してはならないとし、近年、家来や雑兵までもが綾羅錦繍で身を飾るようになったことは古法に反すると厳しく制限しています。'
  - '衣服の色や生地、紋様は江戸時代を通じて身分秩序を可視化する重要な手段でした。誰もが自由に高級な装束を身につけられるようになれば、見た目だけで身分の上下を判別できなくなり、武家社会の秩序そのものが揺らいでしまいます。'
  - '例えば、本来なら大名や将軍に近い格式の者しか許されない紫の装束を、一介の家来が着用して城下を歩けば、身分制度そのものへの挑戦と受け取られました。第十二条が定める倹約の奨励ともあわせて、華美な装いを抑えることで、武士社会の分不相応な贅沢や身分の混同を防ごうとする狙いがうかがえます。'
