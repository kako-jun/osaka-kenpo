article: 5
title: '第5条 他国者の交流禁止'
originalText:
  - '自今以後、国人の外、他国の者を交え置くべからざる事。'
  - '凡そ国に因りてその風これ異なる。或いは自国の密事を以て他国に告げ、或いは他国の密事を自国に告ぐ。佞媚の萌しなり。'
osakaText:
  - 'これから先は、自分とこの領国の者以外、つまり他国の出身者を家中に交えて置いたらあかんことやで。'
  - 'そもそも国によって風習いうんはそれぞれ違うもんなんや。他国の者を置いとったら、自分とこの秘密が他国に漏れてしもたり、逆に他国の秘密が持ち込まれたりするやろ。これはへつらいや謀略の芽になるんやで。'
commentary:
  - '第五条は、以後は自分の領国の者以外、つまり他国の出身者を家中に交え置いてはならないと定めた条文です。細注では、国ごとに風俗が異なるため、他国者を通じて自国の機密が漏れたり、逆に他国の機密がもたらされたりすることが、へつらいや謀略の温床になると説明されています。'
  - '戦国時代には、有能な人材であれば出身国を問わず登用する風潮がありましたが、江戸幕府は諸大名同士が情報や人材を通じて結びつくことを警戒しました。大名同士の私的なつながりが強まれば、幕府の統制が及ばない同盟関係が生まれかねないためです。'
  - '例えば、ある大名が隣国出身の有能な浪人を重用すれば、その人物を通じて自国の内情が他国に伝わったり、逆に他国の情報がもたらされたりする恐れがあります。この条文は第七条が禁じる隣国との徒党形成ともつながっており、大名同士の横のつながりを断ち切ることで、幕府を頂点とする一元的な支配体制を築こうとする狙いがうかがえます。'
commentaryOsaka:
  - '人を信用するかどうかは出身地だけでは決められへん、いうのは今の感覚やと当たり前に思うことやけど、この条文はまさに逆の発想でできとるんよ。戦国の頃は実力さえあれば出身を問わず登用する風潮があったのに、江戸幕府はそれをあえて締め出そうとしたんやな。'
  - '例えばな、Iさんいう大名の家に、隣国出身のJさんが行儀見習いとして仕えとったとするやろ。Jさん自身は真面目に働いとって、悪気なんて全然ないんよ。せやけど里帰りのたびに、家族との世間話の中でぽろっと「うちの殿様は今こんなことで悩んどってな」て話してしまうかもしれへん。本人に裏切るつもりがのうても、国と国の間に情報の抜け道ができてしまうんよ。'
  - 'この条文が守ろうとしとるんは、人そのものへの不信いうより「情報のつながり」やと、わたしは思うわ。有能な人を遠ざけるんはもったいない話なんやけど、諸大名が人材や情報を通じてこっそり結びつくことを、幕府はそれだけ警戒しとったていうことやねん。'
