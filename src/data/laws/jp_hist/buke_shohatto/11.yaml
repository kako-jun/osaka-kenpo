article: 11
title: '第11条 乗輿の制限'
originalText:
  - '雑人、恣に乗輿すべからざる事。'
  - '古来その人に依り、御免無くして乗輿の家これ有り、御免の以後乗る家これ有り。然るに近年、家郎諸卒に及びて乗輿す。誠に濫吹の至りなり。向後に於いては、国大名以下一門の歴々は御免に及ばず乗るべし。その外、眤近の衆並びに医陰両道、或いは六十以上の人、或いは病人等は御免の以後乗るべし。家郎従卒、恣に乗らしむる者は、その主人越度たるべきなり。但し公家・門跡幷びに諸出世の衆は制限に非ず。'
osakaText:
  - '身分の低い者が、勝手気ままに輿に乗ったらあかんことやで。'
  - '昔から、その人柄によっては許可のう輿に乗ってもええ家もあれば、許可を得てから乗る家もあったんや。せやけど近頃は、家来や雑兵に至るまで輿に乗るようになってしもうた。これはほんまに度を越えた話やで。これから先は、国持大名以下、一門の歴々は許可のう乗ってええこととする。それ以外の側近衆や医者・陰陽師、それに六十歳以上の人、病人なんかは、許可を得てから乗るべきなんや。家来が勝手に乗るのを許してしもたら、その主人の落ち度になるんやで。ただし公家や門跡、それに諸々出世した衆は、この制限には当たらんのやで。'
commentary:
  - '第十一条は、身分の低い者がみだりに輿に乗ってはならないと定めた条文です。細注では、古来より特定の家柄には許可なく輿に乗る慣例があった一方、近年は家来や雑兵に至るまで輿を用いるようになり、これは著しい濫用であると指摘しています。今後は国持大名以下の歴々の家柄は許可なく乗ってよいが、それ以外の側近や医師・陰陽師、六十歳以上の高齢者、病人などは許可を得たうえで乗るべきとし、家来が勝手に乗せた場合はその主人の落ち度になるとしています。ただし公家や門跡などはこの制限の対象外とされています。'
  - '輿に乗ることは徒歩で移動する一般の家臣とは一線を画す特権であり、これも衣裳と同様に身分秩序を目に見える形で示すものでした。誰もが輿に乗るようになれば、行列を見ただけでは身分の上下が判別できなくなってしまいます。'
  - '例えば、体力のある若い家来が主人の許可も得ずに輿に乗って移動していれば、それは身分不相応な振る舞いとみなされ、処罰の対象になりかねません。一方で高齢者や病人には例外的に配慮がなされている点は、単なる身分統制にとどまらない実務的な配慮も読み取れます。第十条の衣裳の制限とあわせて、外見によって秩序を可視化しようとする幕府の姿勢がよく表れた条文です。'
commentaryOsaka:
  - '輿に乗るか歩くかで身分が分かる、いうのも今の感覚やとちょっと想像しにくい話かもしれへんね。せやけどこの条文がようできとるのは、ただ「輿に乗るな」て禁止しとるだけやのうて、体力のない年配の人や病人にはちゃんと道を開けとるところなんよ。'
  - '例えばな、まだ若うて体力もある家来の太郎さんが、主人の許可も取らんとええ気になって輿に乗って移動しとったら、それは身分不相応な振る舞いやと見なされて、下手したら主人のUさんまで叱られてしまうんよ。でも同じ家中でも、六十歳を超えたVさんや、病気で足腰が弱っとるWさんやったら、話は別なんや。ちゃんと許可を得たうえで輿に乗ることが認められとるんよ。'
  - 'この条文は「身分」と「事情」を両方見ながら線を引いとるところが、わたしはなかなか丁寧やなと思うわ。若さと体力がある者にまで輿を許してしもたら見せびらかしになってしまうけど、年老いた人や病人にまで歩けと強いるんは酷な話やろ。家来が勝手をした時の責任を主人に負わせとる点も含めて、統治する側の目配りが感じられる条文やねん。'
