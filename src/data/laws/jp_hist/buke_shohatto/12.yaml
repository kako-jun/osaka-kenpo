article: 12
title: '第12条 倹約の奨励'
originalText:
  - '諸国の諸侍、倹約を用いらるべき事。'
  - '富者は弥々誇り、貧者は及ばざるを恥ず。俗の凋弊、これより甚だしきは無し。厳制せしむる所なり。'
osakaText:
  - '諸国の侍たちは、倹約を心がけなあかんことやで。'
  - 'お金持ちはますます誇らしげにして、貧しい者は追いつけんことを恥ずかしがる。世の中の乱れで、これほどひどいもんはあらへん。せやから、厳しゅう取り締まるんやで。'
commentary:
  - '第十二条は、諸国の武士に対し倹約を用いるよう命じた条文です。細注では、富める者はますます奢りを誇り、貧しい者は追いつけないことを恥じるようになり、こうした風潮の乱れはこれ以上ないほど深刻であるため、厳しく取り締まると述べています。'
  - '戦乱の時代が終わり平和が続くと、武士の暮らしは軍事一辺倒から次第に贅沢や見栄の張り合いへと傾いていきました。石高に見合わない華美な暮らしをする武士が増えれば、家計は逼迫し、いざという時に主家へ奉公する力さえ失われかねません。'
  - '例えば、見栄を張って身分不相応な屋敷や衣裳、催しに金を費やす武士がいれば、その家は借財を重ね、やがて経済的に立ち行かなくなってしまいます。第一条が求める文武の鍛錬や第十条が定める衣裳の制限とあわせて読むと、この条文は武士としての本分を忘れさせないための一連の生活統制の総仕上げにあたる規定だといえます。'
commentaryOsaka:
  - '人は誰かと比べてしまう生き物なんよね。この条文が見つめとるのは、まさにその「比べる心」が武士の暮らしをじわじわ壊していく様子やと、わたしは思うんよ。'
  - '例えばな、裕福なXさんいう武士が、屋敷を建て替えて豪華な催しを開いたとするやろ。それを見た同じ身分のYさんは、恥ずかしい思いをせんように無理して同じくらいの見栄を張ろうとする。Yさんには本当はそんな余裕はないのに、借金してでも張り合おうとしてしまうんよ。ほんで、それを見たまた別の武士も同じように無理をする。そうやって見栄の連鎖がどんどん広がっていくんやな。'
  - '「富者は弥々誇り、貧者は及ばざるを恥ず」ていう言葉は、たった一文で見栄の連鎖の恐ろしさをズバッと言い当てとるやろ。倹約せえと命じるだけやのうて、その裏にある「比べる心」の危うさまで見抜いとるところに、この条文の深さがあるんとちゃうかな。'
