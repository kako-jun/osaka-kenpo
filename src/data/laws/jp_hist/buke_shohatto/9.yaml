article: 9
title: '第9条 参勤の作法'
originalText:
  - '諸大名参勤の作法の事。'
  - '続日本紀の制に曰く、公事に預からずんば、恣に己が族を集むるを得ず。京裡二十騎以上、集め行くを得ずと、云々。然れば則ち卒多勢を引くべからず。百万石以下二十万石以上は二十騎を過ぐべからず。十万石以下はその相応たるべし。蓋し公役の時はその分限に随うべし。'
osakaText: []
commentary:
  - '第九条は、諸大名が江戸へ参勤する際の作法を定めた条文です。細注では『続日本紀』の古い制度を引き合いに出し、公務でなければ勝手に一族郎党を集めて多人数で行動してはならないとし、石高に応じて随行する騎馬の人数に上限を設けています。百万石以下二十万石以上は二十騎まで、十万石以下はそれに相応した人数とし、公役の際は身分に応じた規模に従うべきだとしています。'
  - 'この条文は、後に第三代将軍徳川家光の寛永令（1635年）で制度化される参勤交代の原型にあたります。元和令の段階では参勤そのものを義務づける規定ではなく、あくまで参勤時の随行人数や作法を制限するものでしたが、大名の軍事力・財力を幕府が把握し、抑制しようとする方向性はすでに明確に表れています。'
  - '例えば、ある大名が江戸出府の際に何百騎もの家臣団を引き連れて行列を組めば、それは軍事力の誇示と受け取られかねず、また移動そのものが大名の財政を圧迫します。石高に応じた随行人数の上限を定めることで、幕府は諸大名の身分秩序を可視化しつつ、無用な軍事的示威や財政の浪費を防ごうとしたのです。'
