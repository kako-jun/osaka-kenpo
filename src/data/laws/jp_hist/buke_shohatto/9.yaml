article: 9
title: '第9条 参勤の作法'
originalText:
  - '諸大名参勤の作法の事。'
  - '続日本紀の制に曰く、公事に預からずんば、恣に己が族を集むるを得ず。京裡二十騎以上、集め行くを得ずと、云々。然れば則ち卒多勢を引くべからず。百万石以下二十万石以上は二十騎を過ぐべからず。十万石以下はその相応たるべし。蓋し公役の時はその分限に随うべし。'
osakaText:
  - '諸大名が参勤する時の作法についてのことやで。'
  - '「続日本紀」の決まりにはこう書いてあるんや。公の用事でなければ、勝手に一族郎党を集めたらあかん、京の中では二十騎以上集めて連れて行ったらあかん、云々とな。せやから、あんまり大勢の家来を引き連れたらあかんのよ。石高が百万石以下二十万石以上の大名は、二十騎を超えたらあかん。十万石以下の大名は、それぞれの身分に見合った人数にせなあかんで。ただし公の役目の時は、その分限に従うもんなんや。'
commentary:
  - '第九条は、諸大名が江戸へ参勤する際の作法を定めた条文です。細注では『続日本紀』の古い制度を引き合いに出し、公務でなければ勝手に一族郎党を集めて多人数で行動してはならないとし、石高に応じて随行する騎馬の人数に上限を設けています。百万石以下二十万石以上は二十騎まで、十万石以下はそれに相応した人数とし、公役の際は身分に応じた規模に従うべきだとしています。'
  - 'この条文は、後に第三代将軍徳川家光の寛永令（1635年）で制度化される参勤交代の原型にあたります。元和令の段階では参勤そのものを義務づける規定ではなく、あくまで参勤時の随行人数や作法を制限するものでしたが、大名の軍事力・財力を幕府が把握し、抑制しようとする方向性はすでに明確に表れています。'
  - '例えば、ある大名が江戸出府の際に何百騎もの家臣団を引き連れて行列を組めば、それは軍事力の誇示と受け取られかねず、また移動そのものが大名の財政を圧迫します。石高に応じた随行人数の上限を定めることで、幕府は諸大名の身分秩序を可視化しつつ、無用な軍事的示威や財政の浪費を防ごうとしたのです。'
commentaryOsaka:
  - 'この条文、奈良時代の「続日本紀」まで引っ張り出してきとるところが面白いんよ。江戸幕府は新しいルールを作るとき、よう昔の権威ある書物を根拠に使うんやけど、これもその一例やねん。'
  - '例えばな、Qさんいう百万石クラスの大名が、江戸に出府する時に見栄を張って三百騎もの行列を組んだとするやろ。周りの家臣も庶民もその豪華さにびっくりするやろうけど、幕府から見たら「なんでそんな大人数を動かせるんや、軍事力の誇示とちゃうか」いう疑いの目で見られてしまうんよ。逆にRさんいう十万石ほどの大名が、身分に見合った少人数でこざっぱり参勤しとったら、余計な疑いを持たれずに済むんやな。'
  - 'この条文は、後の時代にできる参勤交代のはしりにあたるもんなんやけど、まだこの時点では「行列の規模を石高に応じて抑えなさい」ていう、どちらかというと軍事力を抑えるための決まりなんよ。人数を制限するいうんは、単なる作法の問題やのうて、諸大名が力を蓄えすぎんようにする、幕府なりの知恵やったんやろうな。'
