article: 1
title: '第1条 文武弓馬の道'
originalText:
  - '文武弓馬の道、専ら相嗜むべき事。'
  - '左文右武は古の法なり。兼ね備えざるべからず。弓馬はこれ武家の要枢なり。兵を号して凶器と為す。已むを得ずしてこれを用う。治にして乱を忘れず、何ぞ修錬を励まざらんや。'
osakaText: []
commentary:
  - '第一条は武家諸法度全体の総則にあたる条文で、大名や武士に対し学問（文）と武芸（弓馬）の両方をたゆまず修めるよう命じています。「左文右武」という言葉が示す通り、文と武はどちらか一方に偏ってはならず、平時であっても乱世を忘れず鍛錬を怠ってはならないという考え方が根底にあります。'
  - 'この条文が第一条に置かれているのは象徴的です。大坂夏の陣で豊臣家を滅ぼした直後に発布されたこの元和令は、戦乱の世が終わったことを宣言する一方で、武士としての本分を忘れさせないための戒めを冒頭に据えたと考えられます。'
  - '例えば、平和な時代が続くと武芸の稽古を怠り、遊興にふける武士も出てきます。この条文はそうした緩みを戒め、日頃から文武両道の鍛錬を続けることで、いざという時に主家や幕府に役立つ人材であり続けるよう求めているのです。第十二条の倹約の奨励とあわせて、太平の世における武士のあり方を規定した条文といえます。'
