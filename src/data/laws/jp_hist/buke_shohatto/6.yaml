article: 6
title: '第6条 居城修補の言上'
originalText:
  - '諸国の居城、修補を成すと雖も、必ず言上すべし。況んや新儀の構営は堅く停止せしむる事。'
  - '城、百雉に過ぐるは国の害なり。塁を峻しくし隍を浚うは大乱の本なり。'
osakaText: []
commentary:
  - '第六条は、諸国の居城について、たとえ修理・補修であっても必ず幕府に届け出るべきこと、まして新たに城を築くことは固く禁じることを定めた条文です。細注では、城が過度に大きく堅固であることは国の害であり、堀や石垣を高く深くすることは大乱のもとになると述べられています。'
  - 'これは一国一城令とあわせて、諸大名の軍事力を幕府が一元的に管理しようとする条文です。城は防御拠点であると同時に反乱の拠点にもなり得るため、無届けでの改修や新築を放置すれば、各地に幕府の統制が及ばない軍事拠点が生まれてしまいます。'
  - '例えば、ある大名が「修理」と称して堀を深くしたり石垣を高く積み直したりすれば、実質的に城の防御力を強化することになりますが、これも届け出なしに行えば違反となります。第七条が隣国での徒党形成を禁じているのと同じく、この条文も大名の軍事的な自立性を削ぎ、幕府への謀反の芽を早い段階で摘み取ろうとするものです。'
