article: 6
title: '第6条 居城修補の言上'
originalText:
  - '諸国の居城、修補を成すと雖も、必ず言上すべし。況んや新儀の構営は堅く停止せしむる事。'
  - '城、百雉に過ぐるは国の害なり。塁を峻しくし隍を浚うは大乱の本なり。'
osakaText:
  - '諸国の居城は、たとえ修理や補修であっても、必ず幕府に届け出なあかんことやで。まして新しく城を築くことは、固う禁止するんや。'
  - '城いうんは、大きすぎたら国にとって害になるんや。石垣を高うしたり堀を深うしたりするんは、大きな乱れのもとになるんやで。'
commentary:
  - '第六条は、諸国の居城について、たとえ修理・補修であっても必ず幕府に届け出るべきこと、まして新たに城を築くことは固く禁じることを定めた条文です。細注では、城が過度に大きく堅固であることは国の害であり、堀や石垣を高く深くすることは大乱のもとになると述べられています。'
  - 'これは一国一城令とあわせて、諸大名の軍事力を幕府が一元的に管理しようとする条文です。城は防御拠点であると同時に反乱の拠点にもなり得るため、無届けでの改修や新築を放置すれば、各地に幕府の統制が及ばない軍事拠点が生まれてしまいます。'
  - '例えば、ある大名が「修理」と称して堀を深くしたり石垣を高く積み直したりすれば、実質的に城の防御力を強化することになりますが、これも届け出なしに行えば違反となります。第七条が隣国での徒党形成を禁じているのと同じく、この条文も大名の軍事的な自立性を削ぎ、幕府への謀反の芽を早い段階で摘み取ろうとするものです。'
commentaryOsaka:
  - '「修理くらいええやろ」て思うかもしれへんけど、この条文はそこまで含めて届け出制にしとるんよ。なんでそこまで厳しいんか、考えてみると面白いんやな。'
  - '例えばな、Kさんいう大名が、届け出ずに「長年の傷みを直すだけや」言うて、堀を少し深うしたり石垣を積み直したりしたとするやろ。本人には城を攻撃用に強化するつもりはのうても、結果として守りはぐっと固くなってしまうんよ。もしこれを幕府が見過ごしてしもたら、Lさんいう別の大名も「うちも直すだけやから」て同じことを始めて、気づいた時には諸国の城がどんどん堅固になってしもてるかもしれへんな。'
  - '「城、百雉に過ぐるは国の害なり」ていう言葉、城が立派すぎることそのものを害やと言い切っとるところが厳しいわな。幕府にしたら、どこかの国がこっそり軍事力を強めることを一番恐れとったんやろう。だからこそ、修理という名目にすら目を光らせなあかんかったんやな。'
