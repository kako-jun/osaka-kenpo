article: 4
title: '第4条 叛逆・殺害人の追放'
originalText:
  - '国々の大名・小名并びに諸給人は、各々相抱うるの士卒、叛逆・殺害人を為すの告げ有らば、速やかに追い出すべき事。'
  - '夫れ野心を挟む者は、国家を覆すの利器、人民を絶つの鋒剣なり。豈にこれ允容するに足らんや。'
osakaText:
  - '諸国の大名や小名、それに家臣を抱える者たちは、自分とこで召し抱えとる士卒の中に謀反や人殺しをした者がおる、いう知らせがあったら、すぐに追い出さなあかんことやで。'
  - 'そもそも野心を抱く者いうんは、国家をひっくり返す道具であり、人々の命を絶つ剣そのものなんや。そんな者を許して置いとくやなんて、とても認められるはずないやろ。'
commentary:
  - '第四条は、諸国の大名・小名や家臣を抱える者に対し、自分が召し抱える士卒の中に謀反や殺害を働いた者がいるという告発があれば、速やかにその者を追放するよう命じた条文です。細注では、野心を抱く者は国家を覆す道具であり人民を害する凶器そのものだと厳しく断じています。'
  - 'この規定は第三条の「法度に背く輩を隠し置くな」という原則を、より具体的に叛逆者・殺害者という重大犯罪に絞って徹底させたものです。大名家中に不穏分子を抱え続けることは、その家自体の存続を危うくするだけでなく、幕藩体制全体の安定を脅かすと考えられていました。'
  - '例えば、ある大名家に仕える家臣が主君への謀反を企てたり、私闘で人を殺めたりした場合、その大名がかばい立てして家中に置き続ければ、幕府はその大名家そのものを危険視することになります。速やかな追放を義務づけることで、各大名家が自らの手で不穏分子を排除し、幕府に対して忠誠と統治能力を示すことを求めているのです。'
commentaryOsaka:
  - 'この条文のポイントは「速やかに」いう二文字やと、わたしは思うんよ。悪い者を最終的に追い出すことより、迷わずすぐ動くことのほうが強調されとるんやな。'
  - '例えばな、Gさんいう大名の家臣が、主君への謀反を企ててそれが発覚したとするやろ。Gさんが「まだ確証がない」「長年仕えてくれた人やし」いうて処分を先延ばしにしとったら、その間に事態はどんどん悪うなっていくかもしれへん。すぐに動いたHさんいう別の大名と比べたら、対応の速さの差が、そのまま家の安定の差になってしまうんよ。'
  - '謀反人を「国家を覆すの利器、人民を絶つの鋒剣」とまで言い切るところに、当時の幕府の危機感がよう出とるわ。第三条で「隠すな」言うといて、第四条でさらに「迅速に追い出せ」て念押しするあたり、幕府がどれだけ謀反というものを恐れとったか伝わってくるやろ。'
