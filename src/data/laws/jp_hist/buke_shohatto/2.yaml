article: 2
title: '第2条 群飲佚遊の制禁'
originalText:
  - '群飲佚遊を制すべき事。'
  - '令条に載する所、厳制殊に重し。好色に耽り博奕を業とするは、これ亡国の基なり。'
osakaText: []
commentary:
  - '第二条は、大名や武士が集団で酒盛りをしたり、勝手気ままに遊び歩いたりすることを厳しく取り締まる条文です。細注では特に色情に溺れることや博奕（賭博）を業とすることを「亡国の基」と断じており、風紀の乱れが家や領国の滅亡につながるという強い危機感が示されています。'
  - '戦国の気風が残る当時、主君や重臣が酒色や賭博におぼれて統治をおろそかにする事例は珍しくありませんでした。幕府は諸法度によって大名の私生活にまで踏み込み、規律ある統治者であることを求めたのです。'
  - '例えば、家臣を集めて連日連夜の酒宴を開き、政務をなおざりにする大名がいれば、それは単なる個人の放埒にとどまらず、家中の統制や領国経営そのものを揺るがしかねません。第十二条が倹約を命じているのと同様に、この条文も大名の自制心と統治者としての自覚を求めるものであり、幕府が諸大名の日常のふるまいにまで監督の目を向けていたことをよく示しています。'
commentaryOsaka: []
