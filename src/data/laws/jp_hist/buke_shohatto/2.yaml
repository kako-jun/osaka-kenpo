article: 2
title: '第2条 群飲佚遊の制禁'
originalText:
  - '群飲佚遊を制すべき事。'
  - '令条に載する所、厳制殊に重し。好色に耽り博奕を業とするは、これ亡国の基なり。'
osakaText:
  - '大勢で酒盛りしたり、好き勝手に遊びほうけたりするのは、しっかり取り締まらなあかんことやで。'
  - 'この決まりに書いてあることは、特に厳しゅう取り締まるべきもんなんや。色恋におぼれたり、博奕を仕事みたいにしてしもたりするんは、国を亡ぼす元になるんやで。'
commentary:
  - '第二条は、大名や武士が集団で酒盛りをしたり、勝手気ままに遊び歩いたりすることを厳しく取り締まる条文です。細注では特に色情に溺れることや博奕（賭博）を業とすることを「亡国の基」と断じており、風紀の乱れが家や領国の滅亡につながるという強い危機感が示されています。'
  - '戦国の気風が残る当時、主君や重臣が酒色や賭博におぼれて統治をおろそかにする事例は珍しくありませんでした。幕府は諸法度によって大名の私生活にまで踏み込み、規律ある統治者であることを求めたのです。'
  - '例えば、家臣を集めて連日連夜の酒宴を開き、政務をなおざりにする大名がいれば、それは単なる個人の放埒にとどまらず、家中の統制や領国経営そのものを揺るがしかねません。第十二条が倹約を命じているのと同様に、この条文も大名の自制心と統治者としての自覚を求めるものであり、幕府が諸大名の日常のふるまいにまで監督の目を向けていたことをよく示しています。'
commentaryOsaka:
  - '楽しく飲んだり遊んだりすること自体が悪いわけやない、そこはまず分かってほしいんよ。この条文が問題にしとるんは「群れて」「際限なく」やってしまうこと、つまり歯止めが利かんようになることやねん。'
  - '例えばな、Cさんいう武士が、最初は仲間と月に一度楽しく飲む程度やったんが、だんだん毎晩のように誘い合うようになって、気づいたら領地の見回りも家臣のまとめ役も放ったらかしになってしもた、いう話を考えてみてな。本人は「ちょっとした息抜きや」思うとっても、まわりから見たらもう職務がおろそかになっとるんよ。Dさんみたいに賭け事にのめり込んで、家の財産を切り崩してしまう人もおったやろな。'
  - 'この条文が怖いんは、悪いことをしとる自覚がないまま、じわじわ立場を失っていくところやと思うわ。今日の一杯、今日の一勝負が、明日の統治能力を奪っていく。せやからこそ、幕府はここまで踏み込んで「制すべき」て書いたんやろうな。'
