article: 3
title: '第3条 法度に背く輩の禁制'
originalText:
  - '法度を背く輩、国々に隠し置くべからざる事。'
  - '法はこれ礼節の本なり。法を以て理を破り、理を以て法を破らず。法に背くの類、その科軽からず。'
osakaText:
  - '決まりに背いた者を、自分とこの領国にこっそり匿うたらあかんことやで。'
  - '法いうんは礼儀や秩序のおおもとになるもんなんや。法を盾にして道理を曲げるのはまだしも、道理を理由にして法を破ったらあかんのよ。決まりに背く輩は、その罪、決して軽いもんとちゃうで。'
commentary:
  - '第三条は、法度に背く者を各領国内に匿ってはならないと定めた条文です。細注では「法は礼節の本なり」として、法を守ることこそが秩序の根幹であり、理屈を盾に法を破ることは許されないという原則が述べられています。'
  - '江戸幕府はこの法度を全国の大名に一斉に守らせることで、幕府の法を諸国の慣習や独自ルールよりも上位に置こうとしました。ある藩で罪を犯した者が別の藩に逃げ込んで匿われてしまえば、幕府の法秩序は形骸化してしまいます。'
  - '例えば、ある大名の家臣が重い罪を犯して出奔し、縁故を頼って隣国の大名に匿われるようなことがあれば、幕府の統制は及ばなくなってしまいます。この条文はそうした抜け道をふさぎ、全国どこであっても幕府の法度が等しく適用されることを保証するものです。第四条が定める叛逆者・殺害者の追放義務とあわせて読むと、幕府が犯罪者の逃げ場をなくすことに強くこだわっていたことがわかります。'
commentaryOsaka:
  - 'この条文でわたしが一番おもしろいと思うんは、罪を犯した本人だけやのうて「匿った人」まで責任を問うとるところなんよ。悪いことをした人を野放しにしてるわけやないんやけど、隠す行為そのものを重く見とるんやな。'
  - '例えばな、Eさんいう家臣が博奕のことで罪に問われて自分の国におられんようになったとするやろ。Eさんの親戚にあたるFさんいう大名が「親戚やし、事情もわかるし」いう情で、自分の領内にこっそり住まわせてしもたら、それはFさんの優しさの問題やのうて、法度そのものを軽んじる話になってしまうんよ。'
  - '「法を以て理を破り、理を以て法を破らず」ていう言葉は、なかなか厳しい言い回しやけど、要は個人の同情や事情より、決まりごとを優先しなさいていうことやねん。今の感覚やと冷たく感じるかもしれへんけど、当時は諸国がバラバラに独自ルールで動いとったから、幕府はこうやって法の上下関係をはっきりさせなあかんかったんやろうな。'
