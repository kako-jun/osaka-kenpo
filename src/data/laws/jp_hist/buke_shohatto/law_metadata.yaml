name: '武家諸法度（元和令）'
shortName: '武家諸法度'
badge: '大名はん、好き勝手させへんで！'
year: 1615
source: '慶長二十年（1615年）七月発布'
description: '江戸幕府が大坂の陣直後の慶長二十年（1615年）に発布した最初の武家諸法度。文武奨励・風紀統制・築城制限・婚姻許可制・参勤の作法・倹約奨励など、諸大名を統制する基本原則を定めた全13ヶ条。'
