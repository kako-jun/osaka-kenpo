article: 7
title: '第7条 隣国での徒党禁止'
originalText:
  - '隣国に於いて新儀を企て徒党を結ぶ者これ有らば、早く言上致すべき事。'
  - '人皆党有り、亦達する者少なし。これを以て或いは君父に順わず、乍ち隣里に違う。旧例を守らずして何ぞ新儀を企てんや。'
osakaText:
  - '隣国で新しいことを企てて徒党を結ぶ者がおったら、早う幕府に報告せなあかんことやで。'
  - '人には誰しも仲間内の集まりがあるもんやけど、道理をわきまえとる者は少ないんよ。せやから、主君や親に従わんかったり、急に近所づきあいを乱したりしてまうんや。昔からの決まりを守らんと、なんで新しいことを企てる必要があるんやろか。'
commentary:
  - '第七条は、隣国において新たな企てを起こし徒党を結ぶ者があれば、早急に幕府へ報告すべきことを定めた条文です。細注では、人には皆それぞれの党派があるが、道理をわきまえた者は少なく、そのために主君や親に従わず、隣里との関係を乱すことがあると指摘し、旧来の慣例を守らずに新儀を企てることを戒めています。'
  - 'ここでいう「新儀」とは、既存の秩序を揺るがす新たな企てや謀略を指します。大名同士が隣国と結託して徒党を組めば、幕府の知らないところで反幕府的な勢力が形成される危険があります。'
  - '例えば、隣り合う二つの大名家が私的に手を結び、幕府に無断で軍事協定のようなものを結んだとすれば、それは幕府の統制を揺るがす重大事です。この条文は、そうした兆候を大名自身がいち早く幕府に報告することを義務づけており、第五条の他国者交流禁止や第六条の築城制限とあわせて、大名同士の水平的な結束を防ぎ、幕府を中心とする垂直的な支配秩序を維持しようとする意図が読み取れます。'
commentaryOsaka:
  - '人が誰かと仲良くグループを作ること自体は、ごく自然なことやと思うんよ。この条文がややこしいのは、その「仲良し」が国境をまたいで、政治的な意味を持ってしまう場合を問題にしとるところやねん。'
  - '例えばな、隣り合う国のMさんとNさんいう二人の大名が、最初はただの気の合う付き合いから始めて、だんだん「お互い何かあったら助け合おう」いう約束をこっそり交わしたとするやろ。本人らは友情のつもりでも、幕府から見たら、知らんところで軍事的なつながりが生まれとることになるんよ。'
  - '「旧例を守らずして何ぞ新儀を企てんや」ていう問いかけは、なかなか厳しい言葉やな。新しいことを企てる時点で、もう秩序を乱す芽やと見なされてしまうんよ。息苦しい話やとは思うけど、幕府にしたら、諸大名同士が幕府の目の届かんところで結びつくことこそが、一番の脅威やったんやろうな。'
