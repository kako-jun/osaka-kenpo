article: 4
title: 第四条
titleOsaka: 第四条
originalText:
  - １　各締約国は、湿地が登録簿に掲げられているかどうかにかかわらず、湿地に自然保護区を設けることにより湿地及び水鳥の保全を促進し、かつ、その自然保護区の監視を十分に行う。
  - ２　締約国は、登録簿に掲げられている湿地の区域を緊急な国家的利益のために廃止し又は縮小する場合には、できる限り湿地資源の喪失を補うべきであり、特に、同一の又は他の地域において水鳥の従前の生息地に相当する生息地を維持するために、新たな自然保護区を創設すべきである。
  - ３　締約国は、湿地及びその動植物に関する研究並びに湿地及びその動植物に関する資料及び刊行物の交換を奨励する。
  - ４　締約国は、湿地の管理により、適当な湿地における水鳥の数を増加させるよう努める。
  - ５　締約国は、湿地の研究、管理及び監視について能力を有する者の訓練を促進する。
osakaText:
  - 1　それぞれの締約国はな、湿地が登録簿に載ってるかどうかにかかわらず、湿地に自然保護区を設けることで湿地と水鳥の保全を促進して、さらにその自然保護区の監視を十分に行うんやで。
  - 2　締約国は、登録簿に載ってる湿地の区域を緊急の国家的な利益のために廃止したり縮小したりする場合にはな、できる限り湿地の資源が失われた分を補うべきなんや。特に、同じ地域か他の地域で、水鳥のこれまでの生息地に相当する生息地を維持するために、新しい自然保護区を作るべきやで。
  - 3　締約国は、湿地とその動植物に関する研究、それから湿地とその動植物に関する資料や刊行物の交換を奨励するんや。
  - 4　締約国は、湿地の管理によって、適当な湿地における水鳥の数を増やすように努めるんやで。
  - 5　締約国は、湿地の研究、管理、監視について能力を持つ人の訓練を促進するんや。
commentary:
  - 本条は、締約国が湿地と水鳥を守るために具体的にとるべき措置を列挙する、保全義務の中心的な規定である。第1項は、湿地が登録簿に掲げられているか否かにかかわらず、湿地に自然保護区を設けて保全を促進し、その監視を十分に行うことを求める。登録湿地だけでなく未登録の湿地も対象とする点に、湿地保全を面的に広げようとする姿勢が表れている。
  - 第2項は、登録湿地を緊急な国家的利益のために廃止・縮小する場合、できる限り湿地資源の喪失を補い、とりわけ同一または他の地域に従前の生息地に相当する新たな自然保護区を創設すべきとする。これは第二条5項が認めた廃止・縮小の権利に、代償を伴わせる歯止めである。開発を全面禁止はしないが、失われた分は埋め合わせよ、という均衡が図られている。
  - 例えば、ある登録湿地が港湾整備で縮小される場合、締約国は近隣に同等の湿地環境を持つ新たな保護区を用意し、水鳥が移り住めるようにすることが期待される。第3項以下は、湿地とその動植物に関する研究や資料・刊行物の交換の奨励、湿地管理による水鳥の増加への努力、研究・管理・監視の担い手の訓練促進を定める。研究・人材育成という長期的基盤づくりまで視野に入れており、本条は保全を一過性でなく継続的な営みとして支える構造になっている。
commentaryOsaka:
  - この条文は、湿地と水鳥を守るために国が具体的に何をするんか、その中身を並べた保全義務の中心的な規定やねん。第1項で注目してほしいのは「登録簿に載ってるかどうかにかかわらず」っていうとこや。登録した湿地だけ守ったらええんやなくて、登録してへん湿地にも自然保護区を作って、ちゃんと監視までする。保全を点やなくて面で広げようっていう姿勢が、ここにはっきり表れてるんやね。
  - 第2項は、第二条5項とセットで読むとよう分かるで。あっちで「緊急の国家的利益のためなら登録湿地を縮小してもええ」て権利を認めた代わりに、こっちで「そのときは失われた分をできる限り埋め合わせなさい」て歯止めをかけてるんや。開発を全面禁止にはせえへんけど、取った分は返す。この釣り合いの取り方が、この条約の現実的なところやと思うわ。
  - 例えばな、A国の登録湿地が港の整備で一部縮小されることになったとするやろ。そしたらA国は、近くに同じような湿地環境を持つ新しい保護区を用意して、すみかを追われた水鳥たちが移り住める場所を確保することが期待されるんや。それだけやのうて、第3項からは研究や資料・刊行物の交換の奨励、湿地の管理で水鳥の数を増やす努力、研究・管理・監視ができる人材の訓練まで定めてある。保護区を作って終わりやなくて、それを支える知識と人を長い目で育てていく。保全を一回きりのイベントやなくて、ずっと続く営みとして設計してあるんやで。
