article: 9
title: 第九条
titleOsaka: ''
originalText:
  - １　この条約は、署名のため無期限に開放しておく。
  - ２　国際連合、いずれかの専門機関若しくは国際原子力機関の加盟国又は国際司法裁判所規程の当事国は、次のいずれかの方法により、この条約の締約国となることができる。
  - (a)批准につき留保を付さないで署名すること。
  - (b)批准を条件として署名した後、批准すること。
  - (c)加入すること。
  - ３　批准又は加入は、批准書又は加入書を国際連合教育科学文化機関事務局長（以下「寄託者」という。）に寄託することによつて行う。
osakaText: []
commentary:
  - 本条は、国がこの条約の締約国となるための手続を定める。第1項は、条約を署名のため無期限に開放しておくと定める。これは加入の門戸を期限で閉ざさず、後からでも参加できるようにする趣旨で、日本が採択から約9年後の1980年に加入できたのもこの開放性による。多くの国の参加を得てこそ湿地と渡り鳥の保全は実効性を持つため、参加の裾野を広げる配慮がなされている。
  - 第2項は、締約国となる資格と方法を定める。国際連合、いずれかの専門機関、国際原子力機関の加盟国、または国際司法裁判所規程の当事国が対象で、批准につき留保を付さずに署名する方法、批准を条件として署名した後に批准する方法、そして加入する方法の三通りが認められる。既に条約が発効した後に参加する国は加入という形をとることになる。
  - 例えば、条約採択の場に居合わせず後から参加を決めた国は、署名ではなく加入という手続で締約国となる。第3項は、批准または加入が、批准書または加入書を寄託者である国際連合教育科学文化機関（ユネスコ）の事務局長に寄託することによって行われると定める。誰が寄託を受け付ける窓口かを明確にすることで、いつ正式に締約国となったかを確定させる。本条が定める寄託の日付は、続く第十条の効力発生時期を計算する起点となる。
