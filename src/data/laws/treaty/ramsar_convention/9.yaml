article: 9
title: 第九条
titleOsaka: 第九条
originalText:
  - １　この条約は、署名のため無期限に開放しておく。
  - ２　国際連合、いずれかの専門機関若しくは国際原子力機関の加盟国又は国際司法裁判所規程の当事国は、次のいずれかの方法により、この条約の締約国となることができる。
  - (a)批准につき留保を付さないで署名すること。
  - (b)批准を条件として署名した後、批准すること。
  - (c)加入すること。
  - ３　批准又は加入は、批准書又は加入書を国際連合教育科学文化機関事務局長（以下「寄託者」という。）に寄託することによつて行う。
osakaText:
  - 1　この条約は、署名のために無期限に開放しとくんやで。
  - 2　国際連合、いずれかの専門機関か国際原子力機関の加盟国、または国際司法裁判所規程の当事国はな、次のどれかの方法で、この条約の締約国となることができるんや。
  - (a) 批准について留保を付けんと署名すること。
  - (b) 批准を条件として署名した後、批准すること。
  - (c) 加入すること。
  - 3　批准または加入はな、批准書か加入書を国際連合教育科学文化機関事務局長（これからは「寄託者」って呼ぶで）に寄託することによって行うんや。
commentary:
  - 本条は、国がこの条約の締約国となるための手続を定める。第1項は、条約を署名のため無期限に開放しておくと定める。これは加入の門戸を期限で閉ざさず、後からでも参加できるようにする趣旨で、日本が採択から約9年後の1980年に加入できたのもこの開放性による。多くの国の参加を得てこそ湿地と渡り鳥の保全は実効性を持つため、参加の裾野を広げる配慮がなされている。
  - 第2項は、締約国となる資格と方法を定める。国際連合、いずれかの専門機関、国際原子力機関の加盟国、または国際司法裁判所規程の当事国が対象で、批准につき留保を付さずに署名する方法、批准を条件として署名した後に批准する方法、そして加入する方法の三通りが認められる。既に条約が発効した後に参加する国は加入という形をとることになる。
  - 例えば、条約採択の場に居合わせず後から参加を決めた国は、署名ではなく加入という手続で締約国となる。第3項は、批准または加入が、批准書または加入書を寄託者である国際連合教育科学文化機関（ユネスコ）の事務局長に寄託することによって行われると定める。誰が寄託を受け付ける窓口かを明確にすることで、いつ正式に締約国となったかを確定させる。本条が定める寄託の日付は、続く第十条の効力発生時期を計算する起点となる。
commentaryOsaka:
  - 国がこの条約の仲間入りをするための手続きを定めた条文やね。第1項の「署名のため無期限に開放しておく」っていうのがまず大事や。「受付は何年まで」なんて期限で門を閉ざさんと、後からでもいつでも参加できるようにしてある。日本が条約の採択から約9年後の1980年に加入できたんも、この開放性のおかげなんやで。湿地と渡り鳥を守るには、一つでも多くの国に参加してもらわな実効性が出えへんから、参加の裾野をできるだけ広げる配慮がされてるんやね。
  - 第2項は、誰がどうやって締約国になれるんかを定めてる。国連やその専門機関、国際原子力機関の加盟国、国際司法裁判所規程の当事国が対象で、方法は三通りや。批准の留保を付けんとそのまま署名する方法、批准を条件に署名してから後で批准する方法、そして加入する方法。もう条約が動き出した後から参加する国は、この「加入」っていう形をとることになるんやで。
  - 例えばな、条約が作られた会議の場におらんかったA国が、何年も経ってから「やっぱりうちも湿地を守る仲間に入りたい」て決めたとするやろ。そのときA国は署名やなくて加入の手続きで締約国になるんや。第3項では、批准書や加入書を預ける相手、つまり寄託者がユネスコの事務局長やと決めてある。窓口をはっきりさせとくことで、どの国がいつ正式に締約国になったんかが確定するんやね。ここで決まる寄託の日付が、次の第十条で効力発生の時期を計算する起点になるんやで。
