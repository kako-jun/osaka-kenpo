article: 12
title: 第十二条
titleOsaka: 第十二条
originalText:
  - １　寄託者は、この条約のすべての署名国及び加入国に対し、できる限り速やかに次の事項を通報する。
  - (a)この条約の署名
  - (b)この条約の批准書の寄託
  - (c)この条約の加入書の寄託
  - (d)この条約の効力発生の日
  - (e)この条約の廃棄の通告
  - ２　寄託者は、この条約が効力を生じたときは、国際連合憲章第百二条の規定により、この条約を国際連合事務局に登録する。
osakaText:
  - 1　寄託者はな、この条約のすべての署名国と加入国に対して、できる限り速やかに次の事項を知らせるんやで。
  - (a) この条約の署名
  - (b) この条約の批准書の寄託
  - (c) この条約の加入書の寄託
  - (d) この条約の効力発生の日
  - (e) この条約の廃棄の通告
  - 2　寄託者は、この条約が効力を生じたときはな、国際連合憲章第百二条の決まりによって、この条約を国際連合事務局に登録するんや。
commentary:
  - 本条は、条約の寄託者が果たすべき通報および登録の任務を定めています。第1項は、寄託者が条約のすべての署名国および加入国に対し、できる限り速やかに、条約の署名、批准書の寄託、加入書の寄託、効力発生の日、そして廃棄の通告という重要な出来事を通報すべきことを列挙しています。第九条で寄託者と定められた国際連合教育科学文化機関（ユネスコ）が、条約をめぐる基本的な事実を締約国全体に周知する情報のハブとなることを意味します。
  - 各国がいつ参加し、いつ効力が生じ、どの国が離脱したのかを正確に共有することは、条約という多国間の約束を円滑に運用するうえで欠かせません。本条が寄託者にこの通報義務を課すことで、締約国は自ら他国の動向を逐一調べなくても、寄託者からの通知によって条約の現状を把握できます。第九条から第十一条までが定めた署名・批准・加入・廃棄といった各手続が、本条の通報を通じて実際に締約国へ伝達される仕組みになっています。
  - 例えば、新たな国が加入書を寄託したり、ある国が条約の廃棄を通告したりすると、寄託者はその事実を全締約国に知らせます。第2項は、条約が効力を生じたとき、寄託者が国際連合憲章第百二条の規定に従って条約を国際連合事務局に登録することを定めています。国連憲章第百二条は、加盟国が締結した条約を国連事務局に登録し公表することを求めるもので、これにより条約は国際社会に対して公然たるものとなります。本条は条約本文の最後を締めくくり、条約が国際法秩序の中に正式に位置づけられることを保証する規定です。
commentaryOsaka:
  - 町内会で頼りになるんは、実は回覧板を確実に回してくれる人やったりするんよね。誰が新しく引っ越してきて、誰が退会して、次の行事はいつなんか。それがみんなに行き渡ってるから、会が会として成り立つ。条約本文の最後を締めくくるこの条文は、まさにその回覧板の係を定めてるんや。第九条で寄託者と決められたユネスコの事務局長が、条約の署名、批准書の寄託、加入書の寄託、効力発生の日、廃棄の通告っていう大事な出来事を、すべての署名国と加入国にできる限り速やかに知らせることになってる。
  - 例えばな、新しくC国が加入書を寄託して、同じ年にB国が廃棄を通告したとするやろ。もしこの条文がなかったら、A国は「いま仲間は何か国で、誰が入って誰が抜けたんやろ」って、自分で世界中に問い合わせて回らなあかん。そんなん、やってられへんわね。寄託者っていう一つの窓口が全部の動きを把握して、全員に知らせてくれるから、各国は通知を受け取るだけで条約の現状が分かる。第九条から第十一条で定めた署名・批准・加入・廃棄の手続きが、この通報を通じて初めてみんなの知るところになるんや。
  - 第2項もええ話やで。条約が効力を生じたら、寄託者は国連憲章第百二条の決まりに従って、この条約を国連事務局に登録するんや。国連憲章第百二条は、加盟国が結んだ条約を国連事務局に登録して公表することを求める規定でな、つまり「内輪だけの秘密の約束にはしません、世界に見えるところに置きます」っていう宣言なんやね。登録されることで、この条約は国際法の秩序の中に正式に位置づけられる。
  - これ、要するに「知らせることと、公にすることが、約束を約束たらしめる」っちゅう話やと思うんよ。派手な条文やないけど、情報がちゃんと巡って、約束が日の当たる場所に置かれてるからこそ、湿地も水鳥も守られていく。最後の条文が縁の下の係のお話やなんて、この条約らしい締めくくりやね。
