article: 5
title: 第五条
titleOsaka: 第五条
originalText:
  - 締約国は、特に二以上の締約国の領域に湿地がわたつている場合又は二以上の締約国に水系が及んでいる場合には、この条約に基づく義務の履行につき、相互に協議する。また、締約国は、湿地及びその動植物の保存に関する現在及び将来の施策及び規制について調整し及びこれを支援するよう努める。
osakaText:
  - 締約国はな、特に二つ以上の締約国の領域に湿地がまたがってる場合や、二つ以上の締約国に水系が及んでる場合には、この条約に基づく義務を果たすことについて、お互いに協議するんやで。それから締約国は、湿地とその動植物の保存に関する今と将来の施策や規制について、調整したり支援したりするように努めるんや。
commentary:
  - 本条は、湿地保全における国際協力と締約国間の協議を定める。とりわけ、二以上の締約国の領域にまたがる湿地がある場合や、二以上の締約国に水系が及んでいる場合には、条約に基づく義務の履行について相互に協議すべきものとする。水や湿地、そこに暮らす生き物は国境という人為的な線とは無関係に広がっているため、一国だけの努力では保全が完結しないという現実に応えた規定である。
  - また本条は、湿地とその動植物の保存に関する現在および将来の施策や規制について、締約国が相互に調整し支援し合うよう努めることも求める。これは義務というより努力目標の性格を持つが、各国がばらばらに動くのではなく歩調を合わせることの重要性を明確にしている。第一条で定義された水鳥の多くが渡りをする点を思えば、この協力の必要性は一層際立つ。
  - 例えば、国境をまたいで広がる大きな湖や、複数国を流れる大河の流域湿地では、一方の国が上流で水を汚したり水量を変えたりすれば、下流の国の湿地や水鳥に直ちに影響が及ぶ。そうした場合に本条は、関係国が事前に協議し施策をすり合わせる足場となる。渡り鳥が越冬地・繁殖地・中継地を国をまたいで行き来することを考えれば、生息地のどこか一箇所が守られなければ全体が崩れかねず、本条の国際協調はこの条約の実効性を支える柱である。
commentaryOsaka:
  - 自然は国境なんか知らん顔や、っていう当たり前の事実に正面から向き合ったのがこの条文やねん。湿地が二つ以上の国にまたがってたり、川の水系が複数の国を流れてたりする場合には、条約の義務を果たすことについてお互いに協議しなさい、て定めてる。水も湿地も、そこに暮らす生き物も、人間が地図に引いた線とは関係なしに広がってるんやから、一つの国だけががんばっても保全は完結せえへんのやね。
  - 例えばな、A国とB国の国境をまたいで大きな湖が広がってたとするやろ。A国が上流で水を汚したり、水量をがらっと変えたりしたら、下流のB国の湿地も水鳥もたちまち影響を受けてまう。B国だけがどんなに一生懸命保全しても、A国が知らんぷりやったら台無しや。そういうときにこの条文が、両国が事前に協議して施策をすり合わせるための足場になるんやで。
  - 後半の「施策や規制の調整・支援に努める」っていう部分は、義務っていうより努力目標の性格が強いんやけど、各国がばらばらに動くんやなくて歩調を合わせることの大切さをはっきりさせてる。第一条で定義された水鳥の多くは渡り鳥やろ。越冬地、繁殖地、途中の休憩地を、国をまたいで行ったり来たりして生きてるんや。その道筋のどこか一箇所でも守られへんかったら、旅の全体が崩れてまう。この条文の国際協調は、条約の実効性を支える柱なんやね。
