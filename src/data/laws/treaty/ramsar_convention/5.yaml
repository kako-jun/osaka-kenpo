article: 5
title: 第五条
titleOsaka: ''
originalText:
  - 締約国は、特に二以上の締約国の領域に湿地がわたつている場合又は二以上の締約国に水系が及んでいる場合には、この条約に基づく義務の履行につき、相互に協議する。また、締約国は、湿地及びその動植物の保存に関する現在及び将来の施策及び規制について調整し及びこれを支援するよう努める。
osakaText: []
commentary:
  - 本条は、湿地保全における国際協力と締約国間の協議を定める。とりわけ、二以上の締約国の領域にまたがる湿地がある場合や、二以上の締約国に水系が及んでいる場合には、条約に基づく義務の履行について相互に協議すべきものとする。水や湿地、そこに暮らす生き物は国境という人為的な線とは無関係に広がっているため、一国だけの努力では保全が完結しないという現実に応えた規定である。
  - また本条は、湿地とその動植物の保存に関する現在および将来の施策や規制について、締約国が相互に調整し支援し合うよう努めることも求める。これは義務というより努力目標の性格を持つが、各国がばらばらに動くのではなく歩調を合わせることの重要性を明確にしている。第一条で定義された水鳥の多くが渡りをする点を思えば、この協力の必要性は一層際立つ。
  - 例えば、国境をまたいで広がる大きな湖や、複数国を流れる大河の流域湿地では、一方の国が上流で水を汚したり水量を変えたりすれば、下流の国の湿地や水鳥に直ちに影響が及ぶ。そうした場合に本条は、関係国が事前に協議し施策をすり合わせる足場となる。渡り鳥が越冬地・繁殖地・中継地を国をまたいで行き来することを考えれば、生息地のどこか一箇所が守られなければ全体が崩れかねず、本条の国際協調はこの条約の実効性を支える柱である。
