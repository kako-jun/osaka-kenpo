article: 11
title: 第十一条
titleOsaka: 第十一条
originalText:
  - １　この条約は、無期限に効力を有する。
  - ２　いずれの締約国も、この条約が自国について効力を生じた日から５年の期間が満了した後は、寄託者が書面による通告を行うことにより、この条約を廃棄することができる。廃棄は、寄託者がその通告を受領した日の後４箇月で効力を生ずる。
osakaText:
  - 1　この条約は、無期限に効力を持つんやで。
  - 2　どの締約国もな、この条約が自分の国について効力を生じた日から5年の期間が満了した後は、寄託者に書面による通告を行うことで、この条約を廃棄することができるんや。廃棄は、寄託者がその通告を受け取った日の後、4か月で効力を生ずるんやね。
commentary:
  - 本条は、条約の有効期間と、締約国が条約から離脱する場合の手続（廃棄）を定める。第1項は、この条約が無期限に効力を有すると定める。湿地と水鳥の保全は一時的な課題ではなく世代を超えて続く取り組みであり、あらかじめ期限を区切らず永続的な枠組みとして条約を位置づける趣旨である。
  - 第2項は、締約国が条約から離脱できる条件を定める。いずれの締約国も、条約が自国について効力を生じた日から5年の期間が満了した後であれば、寄託者に書面で通告することによって条約を廃棄できる。そして廃棄は、寄託者が通告を受領した日の後4か月で効力を生ずる。加入して間もなく気軽に抜けることを防ぐ5年間の据置期間と、離脱にも4か月の猶予を設ける点に、条約関係の安定を保とうとする配慮が表れている。
  - 例えば、ある国が国内事情から条約を離脱しようと考えても、加入からまだ5年が経っていなければ廃棄はできず、5年経過後に書面で通告し、さらに4か月を待ってはじめて離脱が成立する。この慎重な手続は、締約国が安易に義務を放棄することを抑え、条約の枠組みを長く維持することに資する。第九条から本条までは、参加(加入)・発効・離脱という締約国の地位の一生を順に定めた一連の規定であり、本条はその最後の段階を扱っている。
commentaryOsaka:
  - 条約がいつまで続くんか、そして抜けたくなったらどうするんか、を定めた条文や。第1項は「無期限に効力を有する」。湿地と水鳥の保全は、10年20年で片が付く一時的な課題やのうて、世代を超えてずっと続けていく取り組みやからね。最初から期限を区切らんと、永続的な枠組みとして条約を位置づけてあるんやで。
  - 第2項は離脱、法律用語でいう「廃棄」の手続きや。抜けるにはまず、条約が自分の国について効力を生じてから5年経ってなあかん。そのうえで寄託者に書面で通告して、さらに通告が受領されてから4か月経って、ようやく廃棄の効力が生ずる。入ってすぐ「やっぱりやーめた」ができへんように5年の据置期間を設けて、離脱にも4か月の猶予を置く。条約の関係を安定させようっていう配慮が、この二重の縛りに表れてるんやね。
  - 例えばな、A国が加入から3年目に国内の事情で「もう抜けたい」て思ったとしても、まだ5年経ってへんから廃棄はでけへんのや。5年の満了を待って、書面で通告して、そこからさらに4か月待って、はじめて離脱が成立する。ずいぶん慎重な手続きやけど、これで各国が安易に義務を放り出すことを防いで、条約の枠組みが長持ちするんやね。第九条から第十一条までを並べて見ると、参加、発効、離脱っていう締約国の地位の一生を順番に定めた一連の規定になってて、この条文はその最後の段階を扱ってるんやで。
