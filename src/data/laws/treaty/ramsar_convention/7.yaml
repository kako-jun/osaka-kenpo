article: 7
title: 第七条
titleOsaka: ''
originalText:
  - １　前条１の会議に出席する締約国の代表には、科学、行政その他の適当と認められる分野において得られた知識及び経験により湿地又は水鳥の専門家とされる者を含めるべきである。
  - ２　会議に代表を出席させる各締約国は、一の票を有するものとし、勧告、決議及び決定は、この条約に別段の定めがある場合を除くほか、出席しかつ投票する締約国の単純過半数による議決で採択する。
osakaText: []
commentary:
  - 本条は、締約国会議に出席する代表の資質と、会議における議決の方法を定める。第1項は、前条で設けられた締約国会議に各国が送る代表には、科学・行政その他の適当な分野で得た知識や経験によって湿地または水鳥の専門家とされる者を含めるべきだとする。湿地保全は生態学や水文学などの専門的知見を要する分野であり、政治的・外交的な立場だけでなく、実質を議論できる専門家の参加を促す趣旨である。
  - 第2項は、会議に代表を出席させる各締約国が一つの票を持つという一国一票の原則を定める。そして勧告・決議・決定は、条約に別段の定めがある場合を除き、出席しかつ投票する締約国の単純過半数によって採択される。大国も小国も等しく一票という平等原則は、多くの多国間条約に共通する民主的な意思決定の基本である。
  - 例えば、ある湿地保全策をめぐって締約国会議で決議案が諮られる場合、出席して投票した国の過半数が賛成すれば採択される。ただし第六条5項の予算採択には三分の二以上、分担率の決定には全会一致というより高いハードルが定められており、事項の重みに応じて議決要件が使い分けられている。本条の一国一票と単純過半数は、その中で通常の勧告・決議に適用される標準的なルールであり、締約国会議が円滑に意思決定を行うための基本を成している。
