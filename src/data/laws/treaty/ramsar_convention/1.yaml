article: 1
title: 第一条
titleOsaka: ''
originalText:
  - 1　この条約の適用上、湿地とは、天然のものであるか人工のものであるか、永続的なものであるか一時的なものであるかを問わず、更には水が滞つているか流れているか、淡水であるか汽水であるか鹹水であるかを問わず、沼沢地、湿原、泥炭地又は水域をいい、低潮時における水深が６メートルを超えない海域を含む。
  - 2　この条約の適用上、水鳥とは、生態学上湿地に依存している鳥類をいう。
osakaText: []
commentary:
  - 本条は、条約全体の土台となる定義規定である。「湿地」の定義は極めて広く、天然か人工か、永続的か一時的か、水が滞留しているか流れているか、淡水・汽水・鹹水（塩水）のいずれかも問わない。沼沢地、湿原、泥炭地、水域に加え、低潮時に水深6メートルを超えない浅い海域までも含む。この広さこそが本条約の特徴で、干潟やサンゴ礁、水田やため池のような人工の水辺までも保全の対象に取り込むことを可能にしている。
  - 例えば、日本初の登録湿地である釧路湿原は典型的な湿原だが、干潟である谷津干潟や、火山湖、地下水系など、性質の大きく異なる場所も同じ「湿地」としてこの条約の下で登録されている。もし定義が「沼と湿原」程度に狭ければ、水鳥にとって重要な干潟や浅海域は保全の網から漏れてしまう。あえて外縁を広く取ることで、水鳥の生息にかかわるあらゆる水辺を守ろうとした立法趣旨がここに表れている。
  - 第2項は「水鳥」を「生態学上湿地に依存している鳥類」と定義する。この条約が単なる湿地保全ではなく、湿地に暮らす水鳥の保護を出発点にしていることを示すもので、正式名称が「特に水鳥の生息地として国際的に重要な湿地に関する条約」であることとも対応する。本条の定義は、以降の第二条以下で「湿地」「水鳥」という語が使われるすべての場面の前提となり、条約の適用範囲そのものを画する重要な役割を担う。
