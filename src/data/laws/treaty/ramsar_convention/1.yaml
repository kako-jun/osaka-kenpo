article: 1
title: 第一条
titleOsaka: 第一条
originalText:
  - 1　この条約の適用上、湿地とは、天然のものであるか人工のものであるか、永続的なものであるか一時的なものであるかを問わず、更には水が滞つているか流れているか、淡水であるか汽水であるか鹹水であるかを問わず、沼沢地、湿原、泥炭地又は水域をいい、低潮時における水深が６メートルを超えない海域を含む。
  - 2　この条約の適用上、水鳥とは、生態学上湿地に依存している鳥類をいう。
osakaText:
  - 1　この条約でいう湿地っていうのはな、天然のもんでも人工のもんでも、ずっとあるもんでも一時的なもんでもかまへんし、さらに水が滞ってても流れてても、淡水でも汽水でも鹹水でもかまへんのやけど、沼沢地、湿原、泥炭地または水域のことをいうんや。低潮のときの水深が6メートルを超えへん海域も含まれるんやで。
  - 2　この条約でいう水鳥っていうのは、生態学の上で湿地に頼って生きてる鳥類のことやねん。
commentary:
  - 本条は、条約全体の土台となる定義規定である。「湿地」の定義は極めて広く、天然か人工か、永続的か一時的か、水が滞留しているか流れているか、淡水・汽水・鹹水（塩水）のいずれかも問わない。沼沢地、湿原、泥炭地、水域に加え、低潮時に水深6メートルを超えない浅い海域までも含む。この広さこそが本条約の特徴で、干潟やサンゴ礁、水田やため池のような人工の水辺までも保全の対象に取り込むことを可能にしている。
  - 例えば、日本初の登録湿地である釧路湿原は典型的な湿原だが、干潟である谷津干潟や、火山湖、地下水系など、性質の大きく異なる場所も同じ「湿地」としてこの条約の下で登録されている。もし定義が「沼と湿原」程度に狭ければ、水鳥にとって重要な干潟や浅海域は保全の網から漏れてしまう。あえて外縁を広く取ることで、水鳥の生息にかかわるあらゆる水辺を守ろうとした立法趣旨がここに表れている。
  - 第2項は「水鳥」を「生態学上湿地に依存している鳥類」と定義する。この条約が単なる湿地保全ではなく、湿地に暮らす水鳥の保護を出発点にしていることを示すもので、正式名称が「特に水鳥の生息地として国際的に重要な湿地に関する条約」であることとも対応する。本条の定義は、以降の第二条以下で「湿地」「水鳥」という語が使われるすべての場面の前提となり、条約の適用範囲そのものを画する重要な役割を担う。
commentaryOsaka:
  - この条文はな、条約全体の土台になる「言葉の定義」を決めてるとこなんや。「湿地」の範囲がびっくりするくらい広いのがポイントやで。天然か人工か、ずっとあるんか一時的なもんか、水が止まってるんか流れてるんか、真水か塩水か、そんなん全部問わへん。沼も湿原も泥炭地も水域も、おまけに潮が引いたとき水深6メートルまでの浅い海まで「湿地」に入るんやから、ほんまに懐が深い定義やねん。
  - 例えばな、Aさんが「湿地て、じめじめした沼のことやろ？」って思ってたとするやろ。ところがこの条約やと、干潟も、サンゴ礁も、田んぼやため池みたいな人の手で作った水辺も、みーんな湿地の仲間に入るんや。日本で最初に登録された釧路湿原は典型的な湿原やけど、谷津干潟みたいな干潟も同じ「湿地」として登録されてるんやで。もし定義を狭くしてたら、水鳥にとって大事な干潟や浅い海が保全の網から漏れてまうとこやった。わざと広く取ってあるのは、水鳥の暮らしにかかわる水辺を丸ごと守りたいからなんやね。
  - 第2項では「水鳥」を「生態学上湿地に依存している鳥類」って定義してるんや。この条約の正式な名前が「特に水鳥の生息地として国際的に重要な湿地に関する条約」やっていうことと、ちゃんと対応してるんやね。つまり出発点は水鳥の保護やねん。ここで決めた「湿地」と「水鳥」の意味は、第二条から先の全部の条文で使われる前提になるんやから、地味に見えて条約の適用範囲そのものを決める、めっちゃ大事な条文なんやで。
