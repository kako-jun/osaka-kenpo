article: 3
title: 第三条
titleOsaka: 第三条
originalText:
  - １　締約国は、登録簿に掲げられている湿地の保全を促進し及びその領域内の湿地をできる限り適正に利用することを促進するため、計画を作成し、実施する。
  - ２　各締約国は、その領域内にあり、かつ、登録簿に掲げられている湿地の生態学的特徴が技術の発達、汚染その他の人為的干渉の結果、既に変化しており、変化しつつあり又は変化するおそれがある場合には、これらの変化に関する情報をできる限り早期に入手することができるような措置をとる。これらの変化に関する情報は、遅滞なく、第八条に規定する事務局の任務について責任を有する機関又は政府に通報する。
osakaText:
  - 1　締約国はな、登録簿に載ってる湿地の保全を促進して、それから自分の領域の中の湿地をできる限り適正に利用することを促進するために、計画を作って実施するんやで。
  - 2　それぞれの締約国は、自分の領域の中にあって登録簿に載ってる湿地の生態学的な特徴がな、技術の発達や汚染その他の人為的な干渉の結果、もう変化してたり、変化しつつあったり、変化するおそれがあったりする場合には、こういう変化に関する情報をできる限りはように手に入れられるような措置をとるんや。そしてこの変化に関する情報は、遅れることなく、第八条に定める事務局の任務について責任を持つ機関か政府に知らせなあかんのやで。
commentary:
  - 本条は、湿地を登録するだけで終わらせず、実際に保全し賢く利用していくための行動を締約国に義務づける。第1項は、締約国が登録簿に掲げられた湿地の保全を促進し、あわせて自国領域内の湿地をできる限り適正に利用する計画を作成・実施すべきことを定める。ここでいう「適正な利用（ワイズユース）」は、湿地を手つかずに閉ざすのではなく、生態系を損なわない範囲で人間が持続的に利用するという、本条約を貫く基本理念である。
  - 第2項は、登録湿地の生態学的特徴が技術開発・汚染その他の人為的干渉によって変化している、変化しつつある、あるいは変化するおそれがある場合に、その情報をできる限り早期に入手できる措置をとり、遅滞なく事務局に通報することを求める。湿地の劣化は徐々に進むことが多く、手遅れになる前に異変を捉えて共有する仕組みが不可欠だという認識に立っている。
  - 例えば、上流での工場排水や周辺の宅地開発によって登録湿地の水質が悪化し、生息する水鳥の数が減り始めた場合、締約国はその変化を監視し、事務局へ報告しなければならない。こうして通報された情報は、第六条の締約国会議で検討され、第八条の事務局を通じて各国に周知される。本条は、第二条で作られた登録制度を「生きた保全」につなげる要の規定であり、監視と情報共有という国際協力の骨格をなしている。
commentaryOsaka:
  - 湿地を登録簿に載せたら終わり、とはならへんのがこの条文や。第1項は、登録した湿地の保全を進めるだけやなくて、自分の国の湿地を「できる限り適正に利用する」計画を作って実施することを求めてるんやね。この「適正な利用」、英語でワイズユースっていう考え方が、この条約を貫く基本理念なんや。湿地を人間立入禁止で閉ざしてまうんやなくて、生態系を壊さん範囲で持続的に使うていく。守ることと使うことを両立させる、なかなか大人な発想やと思わへん？
  - 第2項は「見張り」の話や。登録湿地の生態学的な特徴が、技術開発や汚染なんかの人為的な干渉で変わってしもてる、変わりつつある、あるいは変わるおそれがある。そういうときに、その情報をできるだけ早うつかめる体制を作って、すぐに事務局へ知らせなあかんのやで。湿地の劣化っていうのはじわじわ進むことが多いから、手遅れになる前に異変をつかまえる仕組みが要る、ていう認識に立ってるんやね。
  - 例えばな、Aさんの住む町の登録湿地で、上流に工場ができて排水が流れ込むようになって、水質が悪うなって水鳥の数が減り始めたとするやろ。そしたらその国は、変化をちゃんと監視して、事務局に報告せなあかん。報告された情報は第六条の締約国会議で検討されて、第八条の事務局を通じてほかの国にも知らされていく。第二条で作った登録制度を「生きた保全」につなげる要の条文で、監視と情報共有っていう国際協力の骨組みがここにあるんやで。
