article: 2
title: 第二条
titleOsaka: 第二条
originalText:
  - １　各締約国は、その領域内の適当な湿地を指定するものとし、指定された湿地は、国際的に重要な湿地に係る登録簿（以下「登録簿」といい、第八条の規定により設けられる事務局が保管する。）に掲げられる。湿地の区域は、これを正確に記述し、かつ、地図上に表示するものとし、また、特に水鳥の生息地として重要である場合には、水辺及び沿岸の地帯であつて湿地に隣接するもの並びに島又は低潮時における水深が六メートルを超える海域であつて湿地に囲まれているものを含めることができる。
  - ２　湿地は、その生態学上、植物学上、動物学上、湖沼学上又は水文学上の国際的重要性に従つて、登録簿に掲げるため選定されるべきである。特に、水鳥にとつていずれの季節においても国際的に重要な湿地は、掲げられるべきである。
  - ３　登録簿に湿地を掲げることは、その湿地の存する締約国の排他的主権を害するものではない。
  - ４　各締約国は、第九条の規定によりこの条約に署名し又は批准書若しくは加入書を寄託する際に、登録簿に掲げるため少なくとも一の湿地を指定する。
  - ５　いずれの締約国も、その領域内の湿地を登録簿に追加し、既に登録簿に掲げられている湿地の区域を拡大し又は既に登録簿に掲げられている湿地の区域を緊急な国家的利益のために廃止し若しくは縮小する権利を有するものとし、当該変更につき、できる限り早期に、第八条に規定する事務局の任務について責任を有する機関又は政府に通報する。
  - ６　各締約国は、その領域内の湿地につき、登録簿への登録のため指定する場合及び登録簿の登録を変更する権利を行使する場合には、渡りをする水鳥の保養、管理及び適正な利用についての国際的責任を考慮する。
osakaText:
  - 1　それぞれの締約国はな、自分の領域の中の適当な湿地を指定することになってて、指定された湿地は、国際的に重要な湿地の登録簿（これからは「登録簿」って呼ぶで。第八条の決まりで設けられる事務局が保管するんや）に載せられるんや。湿地の区域は正確に記述して、地図の上にも表示せなあかん。それから、特に水鳥のすみかとして重要な場合にはな、湿地の隣にある水辺や沿岸の地帯、それに湿地に囲まれてる島や、低潮のときの水深が6メートルを超える海域も含めることができるんやで。
  - 2　湿地はな、生態学の上、植物学の上、動物学の上、湖沼学の上、または水文学の上での国際的な重要性に従って、登録簿に載せるために選ばれるべきなんや。特に、水鳥にとってどの季節でも国際的に重要な湿地は、載せられるべきやね。
  - 3　登録簿に湿地を載せることは、その湿地がある締約国の排他的な主権を害するもんとはちゃうで。
  - 4　それぞれの締約国は、第九条の決まりによってこの条約に署名するとき、または批准書か加入書を寄託するときに、登録簿に載せるために少なくとも一つの湿地を指定するんや。
  - 5　どの締約国もな、自分の領域の中の湿地を登録簿に追加したり、もう登録簿に載ってる湿地の区域を広げたり、緊急の国家的な利益のために廃止したり縮小したりする権利を持ってるんやけど、その変更については、できる限りはよう、第八条に定める事務局の任務について責任を持つ機関か政府に知らせなあかんのやで。
  - 6　それぞれの締約国は、自分の領域の中の湿地を登録簿に登録するために指定する場合と、登録を変更する権利を使う場合にはな、渡りをする水鳥の保養、管理、それから適正な利用についての国際的な責任を考えに入れるんや。
commentary:
  - 本条は、条約の中核である国際的に重要な湿地の登録制度を定める。各締約国は自国領域内の適当な湿地を指定し、それが第八条の事務局が保管する「登録簿」に掲げられる。登録に際しては湿地の区域を正確に記述し地図上に表示することが求められ、水鳥の生息地として重要な場合には隣接する水辺や沿岸地帯、湿地に囲まれた島や深い海域も含めることができる。第2項は、掲載の選定基準を生態学・植物学・動物学・湖沼学・水文学上の国際的重要性に置き、とりわけ水鳥にとって重要な湿地を優先すべきとする。
  - 第3項は、登録が締約国の排他的主権を害さないことを明記する。これは各国が主権への懸念なく登録に参加できるようにするための重要な配慮である。第4項により、各国は条約の署名・批准・加入の際に少なくとも一つの湿地を登録指定する義務を負う。日本は1980年の加入に際し、この規定に従って釧路湿原を最初の登録湿地とした。第5項は追加・拡大のほか、緊急な国家的利益のための廃止・縮小の権利も認めるが、その場合は事務局へ通報しなければならない。
  - 例えば、ある国がダム建設という国家的事業のために登録湿地の一部を縮小しようとする場合でも、条約は一律に禁止するのではなく、権利として認めつつ事務局への通報を義務づける。そのうえで第6項は、渡り鳥が国境を越えて移動する存在であることを踏まえ、登録や変更にあたって渡りをする水鳥の保護についての国際的責任を考慮するよう求める。廃止・縮小の場合の代償措置は続く第四条2項で具体化されており、本条と第四条は登録制度と実質的な保全義務を両輪として結びつけている。
commentaryOsaka:
  - ここはこの条約の心臓部、「登録制度」を決めた条文やねん。各国が自分の国の中の大事な湿地を選んで、事務局が保管する国際的な登録簿に載せる。この仕組みがあるからこそ「ラムサール条約登録湿地」っていう言葉が生まれるわけや。登録するときは区域を正確に書いて地図にも示さなあかんし、水鳥に大事な場所なら隣の水辺や島まで含められる。ええかげんな線引きは許さへん、ていうことやね。
  - 第3項がなかなか気が利いてるんや。登録しても、その国の主権は害されへんて、わざわざ書いてある。「国際的な登録簿に載せたら自分の国の土地やのに口出しされるんちゃうか」て心配になる国もあるやろ。その不安を先回りして消しといたから、各国が安心して参加できるんやね。それから第4項では、条約に入るときに最低一つは湿地を指定せなあかんことになってる。日本は1980年に加入したときに、この決まりに従って釧路湿原を最初の登録湿地にしたんやで。
  - 例えばな、B国がダム建設っていう国家的な事業のために、登録した湿地の一部を縮小したいと考えたとするやろ。この条約は「絶対あかん」て禁止はせえへんのや。緊急の国家的利益のためなら縮小する権利も認める。そのかわり、事務局にできる限り早く知らせなあかんし、第6項では渡り鳥への国際的な責任も考えなあかんことになってる。渡り鳥は国境なんか関係なしに飛んでいくんやから、一つの国の勝手で生息地を潰したら、よその国の空からも鳥が消えてまう。縮小したときの埋め合わせは第四条2項で具体化されてて、この二つの条文が両輪になって登録制度を支えてるんやね。
