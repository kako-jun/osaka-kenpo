commentary:
  - 本条は、条約の中核である国際的に重要な湿地の登録制度を定める。各締約国は自国領域内の適当な湿地を指定し、それが第八条の事務局が保管する「登録簿」に掲げられる。登録に際しては湿地の区域を正確に記述し地図上に表示することが求められ、水鳥の生息地として重要な場合には隣接する水辺や沿岸地帯、湿地に囲まれた島や深い海域も含めることができる。第2項は、掲載の選定基準を生態学・植物学・動物学・湖沼学・水文学上の国際的重要性に置き、とりわけ水鳥にとって重要な湿地を優先すべきとする。
  - 第3項は、登録が締約国の排他的主権を害さないことを明記する。これは各国が主権への懸念なく登録に参加できるようにするための重要な配慮である。第4項により、各国は条約の署名・批准・加入の際に少なくとも一つの湿地を登録指定する義務を負う。日本は1980年の加入に際し、この規定に従って釧路湿原を最初の登録湿地とした。第5項は追加・拡大のほか、緊急な国家的利益のための廃止・縮小の権利も認めるが、その場合は事務局へ通報しなければならない。
  - 例えば、ある国がダム建設という国家的事業のために登録湿地の一部を縮小しようとする場合でも、条約は一律に禁止するのではなく、権利として認めつつ事務局への通報を義務づける。そのうえで第6項は、渡り鳥が国境を越えて移動する存在であることを踏まえ、登録や変更にあたって渡りをする水鳥の保護についての国際的責任を考慮するよう求める。廃止・縮小の場合の代償措置は続く第四条2項で具体化されており、本条と第四条は登録制度と実質的な保全義務を両輪として結びつけている。
