article: 10
title: 第十条
titleOsaka: 第十条
originalText:
  - １　この条約は、前条２の規定に基づいて７の国がこの条約の締約国となつた後４箇月で効力を生ずる。
  - ２　その後は、この条約は、批准につき留保を付さないで署名した日又は批准書若しくは加入書を寄託した日の後４箇月で各締約国について効力を生ずる。
osakaText:
  - 1　この条約はな、前条2の決まりに基づいて7の国がこの条約の締約国となった後、4か月で効力を生ずるんやで。
  - 2　その後は、この条約は、批准について留保を付けんと署名した日、または批准書か加入書を寄託した日の後、4か月でそれぞれの締約国について効力を生ずるんや。
commentary:
  - 本条は、条約がいつ効力を生じるか、すなわち発効の要件を定める。第1項は、第九条2項の規定に基づいて7の国が締約国となった後4か月で条約が効力を生ずると定める。一定数の国の参加が集まってはじめて条約を動かすという要件は、国際条約に広く見られる仕組みで、あまりに少ない国だけで発効しても実効性に乏しいという考えに基づく。ラムサール条約は1971年の採択後、この要件を満たして発効に至った。
  - 第2項は、その後に締約国となる国について、批准につき留保を付さずに署名した日、または批准書・加入書を寄託した日の後4か月で、各締約国について効力を生ずると定める。つまり、条約全体の発効とは別に、後から参加する各国ごとに個別の発効日が存在することになる。第九条が定めた署名・批准・加入という参加手続と、本条の4か月という期間が組み合わさって、各国の締約国としての地位がいつ始まるかが確定する。
  - 例えば、日本は1980年に加入書を寄託したが、その効力が実際に生じたのは寄託から4か月を経た後である。この4か月という猶予は、各国が国内の準備を整えるための期間としての意味も持つ。本条は、条約という国際的な約束が抽象的な合意にとどまらず、具体的な日付をもって法的拘束力を帯びる瞬間を明確に定めた規定であり、締約国の義務が現実に発生する起点を画している。
commentaryOsaka:
  - 条約がいつから「本物の約束」として動き出すんか、その発効の要件を定めた条文やね。第1項では、7つの国が締約国になってから4か月で条約が効力を生ずると決めてある。一定の数の国が集まってはじめて条約を発車させるっていう仕組みは国際条約でよう見られるもんで、参加国が二つ三つしかないのに発効しても実効性に乏しいやろ、っていう考えに基づいてるんや。ラムサール条約は1971年に採択されて、この要件を満たして発効に至ったんやで。
  - 第2項は、後から参加する国の話や。批准の留保なしに署名した日、または批准書・加入書を寄託した日から4か月後に、その国について効力が生ずる。つまり条約全体の発効日とは別に、後から入る国にはそれぞれ自分の発効日があるんやね。第九条で決めた参加の手続きと、この4か月っていう期間が組み合わさって、各国の締約国としての地位がいつ始まるんかが確定するわけや。
  - 例えばな、A国が今日、加入書を寄託したとしても、明日からすぐ条約上の義務が発生するわけやないねん。4か月待って、それから効力が生ずる。日本も1980年に加入書を寄託して、実際に効力が生じたんは寄託から4か月を経た後やった。この猶予期間は、国内の体制やら法令やらの準備を整えるための時間っていう意味も持ってるんやろね。条約っていう国際的な約束が、ふわっとした合意やのうて、具体的な日付をもって法的な拘束力を帯びる。その瞬間をきっちり定めた条文なんやで。
