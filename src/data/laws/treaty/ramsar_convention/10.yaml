article: 10
title: 第十条
titleOsaka: ''
originalText:
  - １　この条約は、前条２の規定に基づいて７の国がこの条約の締約国となつた後４箇月で効力を生ずる。
  - ２　その後は、この条約は、批准につき留保を付さないで署名した日又は批准書若しくは加入書を寄託した日の後４箇月で各締約国について効力を生ずる。
osakaText: []
commentary:
  - 本条は、条約がいつ効力を生じるか、すなわち発効の要件を定める。第1項は、第九条2項の規定に基づいて7の国が締約国となった後4か月で条約が効力を生ずると定める。一定数の国の参加が集まってはじめて条約を動かすという要件は、国際条約に広く見られる仕組みで、あまりに少ない国だけで発効しても実効性に乏しいという考えに基づく。ラムサール条約は1971年の採択後、この要件を満たして発効に至った。
  - 第2項は、その後に締約国となる国について、批准につき留保を付さずに署名した日、または批准書・加入書を寄託した日の後4か月で、各締約国について効力を生ずると定める。つまり、条約全体の発効とは別に、後から参加する各国ごとに個別の発効日が存在することになる。第九条が定めた署名・批准・加入という参加手続と、本条の4か月という期間が組み合わさって、各国の締約国としての地位がいつ始まるかが確定する。
  - 例えば、日本は1980年に加入書を寄託したが、その効力が実際に生じたのは寄託から4か月を経た後である。この4か月という猶予は、各国が国内の準備を整えるための期間としての意味も持つ。本条は、条約という国際的な約束が抽象的な合意にとどまらず、具体的な日付をもって法的拘束力を帯びる瞬間を明確に定めた規定であり、締約国の義務が現実に発生する起点を画している。
