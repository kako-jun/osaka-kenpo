commentary:
  - 本条は、条約の実務を担う事務局について定める。第1項は、他の機関または政府が全締約国の三分の二以上の多数決で指定されるまでの間、自然及び天然資源の保全に関する国際同盟（IUCN、国際自然保護連合）が事務局の任務を行うと定める。国際条約の運営には日常的な事務を担う常設機関が不可欠だが、新たな組織を一から作るのではなく、既に湿地や自然保護に知見を持つ既存の国際団体に暫定的に任務を委ねた点に、実務的な工夫がうかがえる。
  - 第2項は事務局の具体的な任務を列挙する。第六条の締約国会議の招集・組織への助力、国際的に重要な湿地の登録簿の保管と第二条5項に基づく締約国からの通報の受理、第三条2項に基づく登録湿地の生態学的特徴の変化に関する通報の受理などである。事務局は登録簿という条約の心臓部を管理し、各国からの情報が集まる結節点として機能する。
  - 例えば、ある締約国が新たな湿地を登録簿に追加したり、既存の登録湿地の生態が悪化したことを通報したりすると、その情報はすべて事務局に集約される。事務局はそれを他のすべての締約国に通知し、次回の締約国会議で討議されるよう取り計らい、関係締約国には必要な勧告を周知させる。こうして本条の事務局は、第二条の登録制度、第三条の変化の通報、第六条の締約国会議を実務面でつなぎ合わせ、条約全体を動かす歯車の役割を果たしている。
