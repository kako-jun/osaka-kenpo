article: 8
title: 第八条
titleOsaka: 第八条
originalText:
  - １　自然及び天然資源の保全に関する国際同盟は、他の機関又は政府がすべての締約国の三分の二以上の多数による議決で指定される時まで、この条約に規定する事務局の任務を行う。
  - ２　事務局は、特に、次の任務を行う。
  - (a)第六条１の会議が招集されかつ組織されるに当たつて助力すること。
  - (b)国際的に重要な湿地に係る登録簿を保管すること及び登録簿に掲げられている湿地に関する追加、拡大、廃止又は縮小につき第２条５の規定により締約国が行う通報を受けること。
  - (c)登録簿に掲げられている湿地の生態学的特徴の変化に関し第３条２の規定により締約国が行う通報を受けること。
  - (d)登録簿の変更又は登録簿に掲げられている湿地の特徴の変化をすべての締約国に通知すること及び次回の会議においてこれらの事項が討議されるように取り計らうこと。
  - (e)登録簿の変更又は登録簿に掲げられている湿地の特徴の変化に関する勧告を関係締約国に周知させること。
osakaText:
  - 1　自然及び天然資源の保全に関する国際同盟はな、他の機関か政府がすべての締約国の三分の二以上の多数による議決で指定されるときまで、この条約に定める事務局の任務を行うんやで。
  - 2　事務局は、特に次の任務を行うんや。
  - (a) 第六条1の会議が招集されて組織されるにあたって、助力すること。
  - (b) 国際的に重要な湿地に係る登録簿を保管すること。それから、登録簿に載ってる湿地に関する追加、拡大、廃止または縮小について、第二条5の決まりによって締約国が行う通報を受けること。
  - (c) 登録簿に載ってる湿地の生態学的な特徴の変化に関して、第三条2の決まりによって締約国が行う通報を受けること。
  - (d) 登録簿の変更や、登録簿に載ってる湿地の特徴の変化を、すべての締約国に知らせること。それから、次回の会議でこれらの事項が討議されるように取り計らうこと。
  - (e) 登録簿の変更や、登録簿に載ってる湿地の特徴の変化に関する勧告を、関係する締約国に広く知らせること。
commentary:
  - 本条は、条約の実務を担う事務局について定める。第1項は、他の機関または政府が全締約国の三分の二以上の多数決で指定されるまでの間、自然及び天然資源の保全に関する国際同盟（IUCN、国際自然保護連合）が事務局の任務を行うと定める。国際条約の運営には日常的な事務を担う常設機関が不可欠だが、新たな組織を一から作るのではなく、既に湿地や自然保護に知見を持つ既存の国際団体に暫定的に任務を委ねた点に、実務的な工夫がうかがえる。
  - 第2項は事務局の具体的な任務を列挙する。第六条の締約国会議の招集・組織への助力、国際的に重要な湿地の登録簿の保管と第二条5項に基づく締約国からの通報の受理、第三条2項に基づく登録湿地の生態学的特徴の変化に関する通報の受理などである。事務局は登録簿という条約の心臓部を管理し、各国からの情報が集まる結節点として機能する。
  - 例えば、ある締約国が新たな湿地を登録簿に追加したり、既存の登録湿地の生態が悪化したことを通報したりすると、その情報はすべて事務局に集約される。事務局はそれを他のすべての締約国に通知し、次回の締約国会議で討議されるよう取り計らい、関係締約国には必要な勧告を周知させる。こうして本条の事務局は、第二条の登録制度、第三条の変化の通報、第六条の締約国会議を実務面でつなぎ合わせ、条約全体を動かす歯車の役割を果たしている。
commentaryOsaka:
  - 条約を日々動かす裏方さん、事務局について定めた条文やねん。おもしろいのは第1項で、新しい組織をゼロから作るんやなくて、「自然及び天然資源の保全に関する国際同盟」、つまりIUCN（国際自然保護連合）っていう、もともと自然保護の知見を持ってる既存の国際団体に事務局の任務を任せたことや。ほかの機関か政府が全締約国の三分の二以上の多数決で指定されるまでの暫定措置っていう形をとってて、実務的な工夫がうかがえるやろ。
  - 第2項に並んでる任務を見たら、事務局の役どころがよう分かるで。締約国会議の招集と組織の手伝い、登録簿の保管、第二条5項に基づく登録の追加・拡大・廃止・縮小の通報の受理、第三条2項に基づく生態の変化の通報の受理。登録簿っていう条約の心臓部を預かって、各国からの情報が集まってくる結節点になってるんやね。
  - 例えばな、A国が新しい湿地を登録簿に追加したり、B国が「うちの登録湿地の生態が悪化してます」て通報したりしたとするやろ。その情報は全部いったん事務局に集まるんや。事務局はそれをすべての締約国に知らせて、次の締約国会議で討議されるように取り計らって、関係する国には必要な勧告を広く伝える。第二条の登録制度、第三条の変化の通報、第六条の締約国会議。ばらばらに見えるこれらの仕組みを実務の面でつなぎ合わせて、条約全体を回してる歯車が、この事務局なんやで。
